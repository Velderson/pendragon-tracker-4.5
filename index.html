  neutral: { bg:'#e4d8b0', field1:'#d4bc68', field2:'#c8b05c', fallow:'#c0a850', pasture:'#b0cc78', woodland:'#70a050', meadow:'#a0c068', waste:'#a8a058', village:'#ccc080', road:'#a89040' },
  green:   { bg:'#dce4c0', field1:'#c8cc80', field2:'#b8c070', fallow:'#b0b860', pasture:'#a0c870', woodland:'#5a9040', meadow:'#90b860', waste:'#989860', village:'#c0c880', road:'#909840' },
};

// ── RENDER MANOR MAP SVG ──────────────────────────────────────────────────
function renderManorMapSVG(charName) {
  const cfg = MANOR_MAP_CONFIG[charName];
  if (!cfg) return '<div style="padding:2rem;font-style:italic;color:#3d2a0e">No map config for this manor.</div>';
  const md = MANOR_DATA[charName];
  const t = MANOR_TONES[cfg.tone] || MANOR_TONES.warm;

  // Village centre
  const W=960, H=820;
  const vx = 480 + (cfg.villageOffset[0]||0);
  const vy = 390 + (cfg.villageOffset[1]||0);

  // Improvements from manor data → feature symbols on map
  const homeManor = md ? md.manors[0] : null;
  const improvements = homeManor ? (homeManor.improvements||[]) : [];
  const bonus = homeManor ? (homeManor.bonus||'') : '';

  // Build river path
  function riverPath(r) {
    const edgePt = (edge, pct) => {
      if (edge==='n') return [pct*W, 0];
      if (edge==='s') return [pct*W, H];
      if (edge==='w') return [0, pct*H];
      if (edge==='e') return [W, pct*H];
      return [W/2, H/2];
    };
    const [x1,y1] = edgePt(r.enterEdge, r.enterPct);
    const [x2,y2] = edgePt(r.exitEdge,  r.exitPct);
    // Route river near village if it passes close
    const mx = (x1+x2)/2 + (Math.random()*40-20);
    const my = (y1+y2)/2 + (Math.random()*40-20);
    return { path:`M${x1},${y1} Q${mx},${my} ${x2},${y2}`, x1,y1,x2,y2,mx,my };
  }
  const rp = riverPath(cfg.river);

  // Road paths — now with name labels
  function roadSvg(roads) {
    return roads.map((rd, i) => {
      const x1=rd.from[0]*W, y1=rd.from[1]*H, x2=rd.to[0]*W, y2=rd.to[1]*H;
      const dash = rd.type==='good' ? '' : 'stroke-dasharray="10,6"';
      const w = rd.type==='good' ? 5 : 3;
      const rid = `${svgId}-road${i}`;
      // Road name label along the path
      const nameLabel = rd.name ? `
        <path id="${rid}" d="M${x1},${y1} L${x2},${y2}" fill="none" stroke="none"/>
        <text font-family="'IM Fell English',serif" font-style="italic" font-size="10" fill="${t.road}" opacity="0.8">
          <textPath href="#${rid}" startOffset="20%">${rd.name}</textPath>
        </text>` : '';
      return `
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${t.road}" stroke-width="${w+2}" opacity="0.2" stroke-linecap="round"/>
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${t.road}" stroke-width="${w}" opacity="0.6" stroke-linecap="round" ${dash}/>
        ${nameLabel}`;
    }).join('');
  }

  // Feature icons near hall
  const hallX = cfg.hallDir==='sw' ? vx-160 : cfg.hallDir==='w' ? vx-180 : cfg.hallDir==='n' ? vx-20 : vx+140;
  const hallY = cfg.hallDir==='sw' ? vy+130 : cfg.hallDir==='w' ? vy+20  : cfg.hallDir==='n' ? vy-160 : vy+80;

  // ── IMPROVEMENT BUILDING ILLUSTRATIONS ──
  // Each returns SVG for a small illustrated building near the hall.
  // Buildings are placed in a cluster spreading from hallX+70 onward.
  // Each gets a data-key="improv-NAME" so the tooltip system picks it up.

  function improvBuilding(imp, x, y, svgId) {
    const inv = INVESTMENT_DATA[imp] || {};
    const key = 'improv-' + imp.replace(/[^a-z0-9]/gi,'_');
    // Tooltip text built from bookkeeping data
    const tipName = imp;
    const tipText = [
      inv.income  ? `Income: ${inv.income}£/yr`  : '',
      inv.maint   ? `Upkeep: ${inv.maint}£/yr`   : '',
      inv.cost    ? `Built for: ${inv.cost}£`     : '',
      inv.notes   ? inv.notes                     : '',
    ].filter(Boolean).join(' · ');

    // Store tooltip data for JS pickup
    const dataAttrs = `class="mz" data-char="${charName}" data-key="${key}" data-improv-name="${tipName}" data-improv-text="${tipText.replace(/"/g,'&quot;')}" style="cursor:pointer"`;

    // Pick building shape by improvement type
    if (imp === 'Dovecote') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <text x="${x-6}" y="${y+4}" text-anchor="middle" font-size="26">🏚️</text>
        <text x="${x+14}" y="${y-8}" text-anchor="middle" font-size="18">🕊️</text>
        <text x="${x}" y="${y+22}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Dovecote</text>
      </g>`;
    }
    if (imp === 'Scriptorium') {
      // Stone scriptorium: rectangular building, arched door, small window
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <rect x="${x-18}" y="${y-18}" width="36" height="32" rx="1" fill="#c8b880" stroke="#6a5020" stroke-width="1"/>
        <polygon points="${x-18},${y-18} ${x+18},${y-18} ${x},${y-34}" fill="#a89060" stroke="#6a5020" stroke-width="0.9"/>
        <rect x="${x-5}" y="${y+2}" width="10" height="12" rx="1" fill="#3a2010"/>
        <path d="M${x-5},${y+2} Q${x},${y-2} ${x+5},${y+2}" fill="#2a1808"/>
        <rect x="${x+6}" y="${y-12}" width="8" height="7" rx="1" fill="#7a9ab0" stroke="#5a6070" stroke-width="0.5" opacity="0.8"/>
        <line x1="${x-12}" y1="${y-8}" x2="${x-6}" y2="${y-8}" stroke="#5a3010" stroke-width="0.6" opacity="0.5"/>
        <line x1="${x-12}" y1="${y-4}" x2="${x-6}" y2="${y-4}" stroke="#5a3010" stroke-width="0.6" opacity="0.5"/>
        <line x1="${x-12}" y1="${y}" x2="${x-6}" y2="${y}" stroke="#5a3010" stroke-width="0.6" opacity="0.5"/>
        <text x="${x}" y="${y+30}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Scriptorium</text>
      </g>`;
    }
    if (imp === 'Apiary') {
      // Three beehive skeps on a bench
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <rect x="${x-22}" y="${y+8}" width="44" height="4" rx="1" fill="#9a7030" stroke="#6a4818" stroke-width="0.7"/>
        <ellipse cx="${x-12}" cy="${y+8}" rx="8" ry="11" fill="#d4a840" stroke="#9a7010" stroke-width="0.8"/>
        <ellipse cx="${x}" cy="${y+8}" rx="8" ry="12" fill="#c89a30" stroke="#9a7010" stroke-width="0.8"/>
        <ellipse cx="${x+12}" cy="${y+8}" rx="8" ry="11" fill="#d4a840" stroke="#9a7010" stroke-width="0.8"/>
        <line x1="${x-18}" y1="${y+2}" x2="${x-6}" y2="${y+2}" stroke="#a07010" stroke-width="0.6"/>
        <line x1="${x-6}" y1="${y-2}" x2="${x+6}" y2="${y-2}" stroke="#a07010" stroke-width="0.6"/>
        <line x1="${x+6}" y1="${y+2}" x2="${x+18}" y2="${y+2}" stroke="#a07010" stroke-width="0.6"/>
        <path d="M${x+18},${y-4} Q${x+24},${y-8} ${x+26},${y-4}" fill="none" stroke="#b8a030" stroke-width="0.7" opacity="0.7"/>
        <path d="M${x+20},${y-2} Q${x+28},${y-6} ${x+29},${y-1}" fill="none" stroke="#b8a030" stroke-width="0.7" opacity="0.6"/>
        <text x="${x}" y="${y+26}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Apiary</text>
      </g>`;
    }
    if (imp === 'Brewery' || imp === 'Brewery, Exclusive') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <rect x="${x-16}" y="${y-14}" width="32" height="28" rx="1" fill="#b8a060" stroke="#6a5020" stroke-width="1"/>
        <polygon points="${x-16},${y-14} ${x+16},${y-14} ${x},${y-28}" fill="#a09050" stroke="#6a5020" stroke-width="0.9"/>
        <ellipse cx="${x-6}" cy="${y+4}" rx="7" ry="9" fill="#7a5030" stroke="#5a3818" stroke-width="0.8"/>
        <ellipse cx="${x+8}" cy="${y+2}" rx="6" ry="8" fill="#6a4028" stroke="#5a3818" stroke-width="0.8"/>
        <text x="${x}" y="${y+28}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">${imp.includes('Exclusive')?'Excl. ':''} Brewery</text>
      </g>`;
    }
    if (imp === 'Fish Pond') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <ellipse cx="${x}" cy="${y}" rx="22" ry="14" fill="#6898b8" stroke="#285878" stroke-width="0.9" opacity="0.85"/>
        <ellipse cx="${x}" cy="${y}" rx="14" ry="8" fill="none" stroke="#4878a0" stroke-width="0.5" opacity="0.5"/>
        <path d="M${x-8},${y-2} Q${x-4},${y-6} ${x},${y-2} Q${x+4},${y+2} ${x+8},${y-2}" fill="none" stroke="#2858a0" stroke-width="1" opacity="0.6"/>
        <text x="${x}" y="${y+26}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Fish Pond</text>
      </g>`;
    }
    if (imp === 'Herb Garden') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <rect x="${x-18}" y="${y-8}" width="36" height="20" rx="2" fill="#8a9840" stroke="#5a6820" stroke-width="0.8" fill-opacity="0.5"/>
        <rect x="${x-16}" y="${y-6}" width="14" height="8" rx="1" fill="#6a8830" stroke="#4a5820" stroke-width="0.6" fill-opacity="0.6"/>
        <rect x="${x+2}" y="${y-6}" width="14" height="8" rx="1" fill="#7a9838" stroke="#4a5820" stroke-width="0.6" fill-opacity="0.6"/>
        <line x1="${x}" y1="${y-8}" x2="${x}" y2="${y+12}" stroke="#4a5820" stroke-width="0.7"/>
        <text x="${x}" y="${y+24}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Herb Garden</text>
      </g>`;
    }
    if (imp === 'Orchard') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <ellipse cx="${x-10}" cy="${y-4}" rx="10" ry="12" fill="#5a8830" stroke="#3a6020" stroke-width="0.8"/>
        <ellipse cx="${x+10}" cy="${y-4}" rx="10" ry="12" fill="#4a7828" stroke="#3a6020" stroke-width="0.8"/>
        <ellipse cx="${x}" cy="${y-8}" rx="9" ry="11" fill="#508030" stroke="#3a6020" stroke-width="0.8"/>
        <line x1="${x-10}" y1="${y+8}" x2="${x-10}" y2="${y+16}" stroke="#6a4020" stroke-width="1.2"/>
        <line x1="${x+10}" y1="${y+8}" x2="${x+10}" y2="${y+16}" stroke="#6a4020" stroke-width="1.2"/>
        <line x1="${x}" y1="${y+3}" x2="${x}" y2="${y+16}" stroke="#6a4020" stroke-width="1.2"/>
        <text x="${x}" y="${y+28}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Orchard</text>
      </g>`;
    }
    if (imp === 'Vineyard') {
      return `<g id="${svgId}-${key}" ${dataAttrs}>
        <line x1="${x-20}" y1="${y-10}" x2="${x+20}" y2="${y-10}" stroke="#6a4820" stroke-width="0.9"/>
        <line x1="${x-20}" y1="${y-2}" x2="${x+20}" y2="${y-2}" stroke="#6a4820" stroke-width="0.9"/>
        <line x1="${x-20}" y1="${y+6}" x2="${x+20}" y2="${y+6}" stroke="#6a4820" stroke-width="0.9"/>
        <g fill="#7a5898" opacity="0.75">
          <circle cx="${x-14}" cy="${y-12}" r="2.5"/><circle cx="${x-8}" cy="${y-13}" r="2.5"/>
          <circle cx="${x-2}" cy="${y-12}" r="2.5"/><circle cx="${x+4}" cy="${y-13}" r="2.5"/>
          <circle cx="${x+10}" cy="${y-12}" r="2.5"/><circle cx="${x+16}" cy="${y-13}" r="2.5"/>
          <circle cx="${x-12}" cy="${y-4}" r="2.5"/><circle cx="${x-6}" cy="${y-5}" r="2.5"/>
          <circle cx="${x}" cy="${y-4}" r="2.5"/><circle cx="${x+6}" cy="${y-5}" r="2.5"/>
          <circle cx="${x+12}" cy="${y-4}" r="2.5"/>
        </g>
        <text x="${x}" y="${y+22}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">Vineyard</text>
      </g>`;
    }
    // Generic fallback — plain stone building
    return `<g id="${svgId}-${key}" ${dataAttrs}>
      <rect x="${x-14}" y="${y-16}" width="28" height="26" rx="1" fill="#b8a870" stroke="#6a5020" stroke-width="0.9"/>
      <polygon points="${x-14},${y-16} ${x+14},${y-16} ${x},${y-28}" fill="#a09060" stroke="#6a5020" stroke-width="0.8"/>
      <rect x="${x-4}" y="${y+2}" width="8" height="8" rx="1" fill="#2a1808"/>
      <text x="${x}" y="${y+24}" text-anchor="middle" font-family="'Crimson Pro',serif" font-size="9" fill="#3a1a06">${imp.length>12?imp.slice(0,11)+'…':imp}</text>
    </g>`;
  }

  const svgId = 'msv_' + charName;

  // Position improvements in a loose cluster near the hall
  const improvPositions = improvements.map((imp, i) => {
    const col = i % 3;
    const row = Math.floor(i / 3);
    return { imp, x: hallX + 80 + col * 58, y: hallY - 30 + row * 60 };
  });
  const improvSymbols = improvPositions.map(({imp,x,y}) => improvBuilding(imp, x, y, svgId)).join('');

  // Bonus marker
  const bonusMarker = bonus.includes('Faer') ? `<text x="${vx+30}" y="${vy-55}" font-family="'IM Fell English',serif" font-style="italic" font-size="9.5" fill="#5a3080" opacity="0.8">✦ Site of Faerie Battle</text>` :
    bonus.includes('Roman') ? `<text x="${hallX+10}" y="${hallY-35}" font-family="'IM Fell English',serif" font-style="italic" font-size="9.5" fill="#6a3808" opacity="0.8">⚔ Ancient battlefield</text>` :
    bonus.includes('Haunt') ? `<text x="${hallX+10}" y="${hallY-35}" font-family="'IM Fell English',serif" font-style="italic" font-size="9.5" fill="#3a1a5a" opacity="0.8">☽ Haunted graveyard</text>` :
    bonus.includes('Hermit') ? `<text x="${hallX+10}" y="${hallY-35}" font-family="'IM Fell English',serif" font-style="italic" font-size="9.5" fill="#2a4a2a" opacity="0.8">⛪ Hermitage</text>` :
    bonus.includes('Plinth') ? `<text x="${hallX+10}" y="${hallY-35}" font-family="'IM Fell English',serif" font-style="italic" font-size="9.5" fill="#5a4a10" opacity="0.8">🗿 Standing stone</text>` : '';

  // Lot count variant — slightly different wedge angles per manor
  const lotCount = cfg.lotCount || 10;

  // Village polygon vertices — slightly different per manor tone
  const vOff = cfg.tone==='cool' ? 5 : cfg.tone==='green' ? -5 : 0;
  const vPoly = [
    [vx-65+vOff, vy-72],[vx-28,vy-95],[vx+18,vy-95],[vx+56,vy-82],
    [vx+74,vy-50],[vx+78,vy-16],[vx+68,vy+18],[vx+48,vy+44],
    [vx+18,vy+60],[vx-18,vy+62],[vx-48,vy+52],[vx-72,vy+32],
    [vx-86,vy+2],[vx-84,vy-32],[vx-72,vy-56]
  ].map(p=>p.join(',')).join(' ');

  // Mill pond — position near river
  const millX = cfg.river.enterEdge==='w' ? vx+80 : vx+70;
  const millY = cfg.river.enterEdge==='w' ? vy+20 : vy+65;

  // Stream connects mill to river
  const streamPath = `M${millX},${millY+30} Q${millX+20},${(millY+30+rp.y2)/2} ${rp.x2-10},${rp.y2-10}`;


  return `
<div style="position:relative;background:#e8d4a0;border:2px solid var(--parchment-shadow);border-radius:3px;overflow:hidden;line-height:0">
<svg id="${svgId}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%">
<defs>
  <pattern id="mp-h0${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(10)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h1${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(55)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h2${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(100)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h3${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(145)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h4${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(25)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h5${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(70)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h6${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(115)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h7${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(160)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h8${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(40)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-h9${charName}" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(85)"><rect width="8" height="16" fill="#9a7820" opacity="0.2"/></pattern>
  <pattern id="mp-fx${charName}" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse"><line x1="0" y1="6" x2="12" y2="6" stroke="#8a6010" stroke-width="0.9" opacity="0.32"/><line x1="6" y1="0" x2="6" y2="12" stroke="#8a6010" stroke-width="0.9" opacity="0.32"/></pattern>
  <pattern id="mp-pd${charName}" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="5" cy="5" r="1.5" fill="#3a6818" opacity="0.38"/></pattern>
  <pattern id="mp-wd${charName}" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse"><circle cx="7" cy="7" r="3" fill="#284810" opacity="0.3"/></pattern>
</defs>

<!-- Background — fallow tone so any hairline gaps blend in -->
<rect width="${W}" height="${H}" fill="${t.fallow}"/>

<g id="${svgId}-lot1" class="mz lot" data-char="${charName}" data-key="lot1" style="cursor:pointer">

  <polygon points="${vx-65+vOff},${vy-72} ${vx-72},${vy-56} ${vx-84},${vy-32} ${vx-160},${vy-100} ${vx-100},${vy-180} 0,${vy-230} 0,0 ${vx-180},0" fill="url(#mp-h0${charName})"/>

<!-- LOT 2 N -->
<g id="${svgId}-lot2" class="mz lot" data-char="${charName}" data-key="lot2" style="cursor:pointer">
  <polygon points="${vx-65+vOff},${vy-72} ${vx-28},${vy-95} ${vx+18},${vy-95} ${vx-10},${vy-220} ${vx-180},${vy-230} ${vx-100},${vy-180} ${vx-160},${vy-100}" fill="${t.field2}" stroke="#8a6810" stroke-width="1.2"/>

  <line x1="${vx-90}" y1="${vy-225}" x2="${vx-68}" y2="${vy-72}" stroke="#7a5808" stroke-width="0.6" opacity="0.4"/>
  <line x1="${vx-50}" y1="${vy-222}" x2="${vx-30}" y2="${vy-96}" stroke="#7a5808" stroke-width="0.6" opacity="0.4"/>

// ── MANOR MAP INTERACTION ─────────────────────────────────────────────────
const manorRaided = {}; // { charName: Set of lot keys }

function initManorMap(charName) {
  if (!manorRaided[charName]) manorRaided[charName] = new Set();
  const svgId = 'msv_' + charName;
  const svg = document.getElementById(svgId);
  if (!svg) return;

  // Remove stale tip if any
  let tip = document.getElementById('mtip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'mtip';
    tip.style.cssText = 'position:fixed;background:#16100a;color:#f0e4c8;border:1px solid #b8902a;border-radius:3px;padding:.5rem .85rem;font-family:Crimson Pro,serif;font-size:.82rem;line-height:1.5;pointer-events:none;opacity:0;transition:opacity .12s;max-width:240px;z-index:9999;';
    document.body.appendChild(tip);
  }

  svg.querySelectorAll('.mz').forEach(z => {
    const key = z.dataset.key;
    const ch  = z.dataset.char;

    // Improvement buildings carry their own tooltip data in attributes
    const isImprov = key && key.startsWith('improv-');
    const d = isImprov
      ? { name: z.dataset.improvName, text: z.dataset.improvText, raidable: false }
      : MANOR_ZONE_DATA[key];
    if (!d) return;

    z.addEventListener('mouseenter', e => {
      const raided = manorRaided[ch] && manorRaided[ch].has(key);
      let extra = d.raidable ? (raided
        ? '<div style="margin-top:.35rem;font-size:.76rem;color:#e08080;font-style:italic;border-top:1px solid rgba(139,26,26,.35);padding-top:.3rem">⚔ Raided — harvest lost. Click to restore.</div>'
        : '<div style="margin-top:.35rem;font-size:.76rem;color:#e08080;font-style:italic;border-top:1px solid rgba(139,26,26,.35);padding-top:.3rem">Click to mark as raided</div>') : '';
      tip.innerHTML = `<b style="font-family:'Cinzel',serif;font-size:.67rem;letter-spacing:.07em;color:#d4aa45;display:block;margin-bottom:.2rem;text-transform:uppercase">${d.name}</b>${d.text}${extra}`;
      tip.style.opacity = '1';
      manorPositTip(e);
      manorHilite(z, key, ch, true);
    });
    z.addEventListener('mousemove', manorPositTip);
    z.addEventListener('mouseleave', () => {
      tip.style.opacity = '0';
      manorHilite(z, key, ch, false);
    });
    if (d.raidable) z.addEventListener('click', () => manorToggleRaid(z, key, ch, d.name));
  });
}

function manorHilite(z, key, ch, on) {
  const s = z.querySelector('polygon,rect,ellipse,path');
  if (!s) return;
  const isRaided = manorRaided[ch] && manorRaided[ch].has(key);
  if (on) {
    s._os = s.getAttribute('stroke'); s._ow = s.getAttribute('stroke-width');
    s.setAttribute('stroke', isRaided ? '#ff5555' : '#b8902a');
    s.setAttribute('stroke-width', '2.5');
  } else {
    if (s._os !== undefined) {
      s.setAttribute('stroke', isRaided ? '#8b1a1a' : s._os);
      s.setAttribute('stroke-width', isRaided ? '2' : (s._ow||'1.2'));
    }
  }
}

function manorToggleRaid(z, key, ch, name) {
  if (!manorRaided[ch]) manorRaided[ch] = new Set();
  const set = manorRaided[ch];
  if (set.has(key)) {
    set.delete(key);
    const ov = z.querySelector('.mro'); if (ov) ov.remove();
    manorLog(ch, `${name} — raid mark cleared.`);
  } else {
    set.add(key);
    const base = z.querySelector('polygon,rect,ellipse');
    if (base) {
      const cl = base.cloneNode(false);
      cl.setAttribute('fill','rgba(139,26,26,0.32)');
      cl.setAttribute('stroke','#8b1a1a');
      cl.setAttribute('stroke-width','2');
      cl.setAttribute('stroke-dasharray','7,3');
      cl.classList.add('mro');
      cl.style.pointerEvents='none';
      z.appendChild(cl);
    }
    manorLog(ch, `⚔ ${name} has been raided! Harvest lost this season.`);
  }
  manorUpdateStatus(ch);
}

function manorLog(ch, msg) {
  const el = document.getElementById('rslog-'+ch);
  if (el) { el.textContent=msg; el.style.display='block'; }
}

function manorUpdateStatus(ch) {
  const set = manorRaided[ch] || new Set();
  const val = document.getElementById('rsval-'+ch);
  const btn = document.getElementById('rsclear-'+ch);
  if (val) val.textContent = set.size ? [...set].map(k=>k.replace('lot','Lot ')).join(', ') : 'none';
  if (btn) btn.style.display = set.size ? 'inline-block' : 'none';
}

function manorClearRaids(ch) {
  const set = manorRaided[ch] || new Set();
  const svgId = 'msv_' + ch;
  const svg = document.getElementById(svgId);
  if (svg) svg.querySelectorAll('.mro').forEach(el=>el.remove());
  set.clear();
  manorUpdateStatus(ch);
  manorLog(ch, 'All raid marks cleared.');
}

function manorPositTip(e) {
  const tip = document.getElementById('mtip');
  if (!tip) return;
  let x = e.clientX + 16, y = e.clientY + 16;
  if (x + 250 > window.innerWidth)  x = e.clientX - 256;
  if (y + 150 > window.innerHeight) y = e.clientY - 150;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}

function renderEstatesPanel(charName) {
  const data = MANOR_DATA[charName];
  if (!data) return '<div style="padding:2rem;color:#3d2a0e;font-style:italic">No estate data for this family.</div>';

  const portrait = PORTRAITS[charName] || null;

  // ── Classify manors ──
  // idx=0 + Demesne → home; other Demesne → remote demesne; Enfeoffed → enfeoffed
  const classifyManor = (m, idx) => {
    if (idx === 0 && m.type.includes('Demesne')) return 'home';
    if (m.type.includes('Demesne')) return 'demesne';
    return 'enfeoffed';
  };

  const homeManor     = data.manors.find((m,i) => classifyManor(m,i) === 'home');
  const demesneManors = data.manors.filter((m,i) => classifyManor(m,i) === 'demesne');
  const enfeoffManors = data.manors.filter((m,i) => classifyManor(m,i) === 'enfeoffed');

  // ── sparkline helper ──
  function sparkline(history, key, color, w=80, h=24) {
    if (!history || !history.length) return `<span style="color:#3d2a0e;font-style:italic;font-size:.7rem">no data</span>`;
    const vals = history.map(h => h[key]||0);
    const mn = Math.min(...vals), mx = Math.max(...vals), range = mx-mn||1;
    const pts = vals.map((v,i)=>{ const x=(i/(vals.length-1||1))*(w-4)+2, y=h-2-((v-mn)/range)*(h-4); return `${x},${y}`; }).join(' ');
    return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1||1))*(w-4)+2,y=h-2-((v-mn)/range)*(h-4);return `<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;}).join('')}</svg>`;
  }

  function barChart(totals) {
    if (!totals.length) return '';
    const W=260, H=90, pad=28, barW=Math.min(26,(W-pad*2)/totals.length-4);
    const maxVal = Math.max(...totals.flatMap(t=>[t.income,t.expenses,Math.abs(t.final)]))||1;
    const scale = (H-20)/maxVal;
    const bars = totals.map((t,i)=>{
      const x=pad+i*((W-pad*2)/totals.length)+((W-pad*2)/totals.length-barW*2-2)/2;
      const incH=Math.max(1,t.income*scale), expH=Math.max(1,t.expenses*scale);
      const finColor=t.final>=0?'#b8902a':'#c0392b';
      return `<rect x="${x}" y="${H-10-incH}" width="${barW}" height="${incH}" fill="#2a7a2a" opacity="0.9"/>
        <rect x="${x+barW+2}" y="${H-10-expH}" width="${barW}" height="${expH}" fill="#8a1a1a" opacity="0.9"/>
        <text x="${x+barW}" y="${H-2}" text-anchor="middle" font-size="8" fill="#3a2008">${t.year}</text>

  const allHistory = (homeManor?.history||[]);
  const years = [...new Set(allHistory.map(h => h.year))].sort();
  const yearTotals = years.map(y => {
    const rows = allHistory.filter(h => h.year===y);
    return {
      year: y,
      income:   rows.reduce((s,r)=>s+(r.income||0),0),
      expenses: rows.reduce((s,r)=>s+(r.lifestyleCost||0)+(r.improvMaint||0)+(r.family||0)+(r.improvBuild||0)+Math.abs(r.misc||0),0),

  // ── HOME MANOR CARD (full featured) ──
  const IMPROV_ICONS = {'Dovecote':'🕊','Scriptorium':'📜','Apiary':'🍯','Observatory':'🔭','Brewery':'🍺','Carpenter Shop':'🪚','Coneygarth':'🐇','Dairy':'🥛','Ferry':'⛵','Fish Pond':'🐟','Gambling House':'🎲','Herb Garden':'🌿','Horse Herd (<530)':'🐴','Horse Herd (530+)':'🐴','Inn':'🏠','Jeweller':'💎','Logging Station':'🪵','Lumber Mill':'🪵','Olive Grove':'🫒','Orchard':'🍎','Salt Evaporator':'🧂','Sheep Herd':'🐑','Vineyard':'🍇','Winery':'🍷','Winery, Fine':'🍷'};

    const histRows = m.history.map(h => {

        <td style="font-size:.7rem;color:#3d2a0e;font-style:italic;max-width:200px;overflow:hidden;text-overflow:ellipsis;padding:.28rem .4rem">${h.notes||''}</td>

    const bonusIcon = (()=>{ if(!m.bonus) return ''; for(const [k,v] of Object.entries(BONUS_ICONS)) if(m.bonus.includes(k)) return v; return '✦'; })();

    const sparkSection = m.history.length ? `<div style="display:flex;gap:1.4rem;flex-wrap:wrap;margin-bottom:.8rem;padding:.7rem .8rem;background:rgba(0,0,0,.04);border-radius:2px;border:1px solid rgba(90,58,16,.2)">

            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:left;padding:.3rem .4rem">Year</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:left;padding:.3rem .4rem">Harvest</th>

            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.3rem .4rem">Costs</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.3rem .4rem">Net</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:left;padding:.3rem .4rem">Notes</th>
          </tr></thead>
          <tbody>${histRows}</tbody>
        </table></div>`:`<div style="color:#3d2a0e;font-style:italic;font-size:.78rem;padding:.4rem 0">No yearly records yet.</div>`}
        ${bonusBadge}${improvBadges}
      </div>
    </div>`;
  }

  // ── HOLDINGS SECTION (demesne + enfeoffed) ──
  let holdingsHtml = '';
  const allHoldings = [...demesneManors, ...enfeoffManors];
  if (allHoldings.length) {
    const holdingCards = allHoldings.map(m => {
      const isDemesne = m.type.includes('Demesne');

      const incomeNote = isDemesne
        ? `<div style="font-size:.68rem;color:#5a9a3a;margin-top:.25rem">📊 Income: Weather Roll − 8£</div>`

      return `<div style="background:${bg};border:1px solid ${borderCol};border-left:3px solid ${borderCol};border-radius:3px;padding:.6rem .9rem;flex:1;min-width:170px;max-width:280px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:.4rem">
          <span style="font-family:'Cinzel',serif;font-size:.85rem;color:#e8c890">🏰 ${m.name}</span>
          <span style="font-size:.58rem;font-family:'Cinzel',serif;text-transform:uppercase;background:${typeBadgeBg};color:${typeBadgeCol};padding:.08rem .4rem;border-radius:2px;border:1px solid ${borderCol}">${typeLabel}</span>
        </div>
        ${m.knight?`<div style="font-size:.72rem;color:#6aaa5a;margin-top:.2rem">⚔ Held by: <strong>${m.knight}</strong></div>`:''}
        ${incomeNote}
        ${m.notes&&!m.notes.includes('Income:')?`<div style="font-size:.68rem;color:#6a5a3a;font-style:italic;margin-top:.2rem">${m.notes}</div>`:''}
      </div>`;
    }).join('');
    holdingsHtml = `<div style="margin-bottom:1.4rem">
      <div style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.6rem">Holdings</div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap">${holdingCards}</div>
    </div>`;
  }

  // ── Sidebar ──
  const sidebar = `
    <div style="position:sticky;top:1rem;display:flex;flex-direction:column;gap:.8rem">
      <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">
        <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:#3a2008;text-transform:uppercase;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--parchment-shadow)">Estate Summary</div>
        ${yearTotals.length ? `
        <div style="margin-bottom:.8rem">${barChart(yearTotals)}</div>
        <table style="width:100%;border-collapse:collapse;font-size:.8rem">
          <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:left;padding:.2rem .3rem">Year</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.2rem .3rem">In</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.2rem .3rem">Out</th>
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.2rem .3rem">Net</th>
          </tr></thead>
          <tbody>
            ${yearTotals.map(t=>`<tr style="border-bottom:1px solid rgba(90,58,16,.12)">
              <td style="font-family:'Cinzel',serif;font-size:.74rem;color:#3a2008;padding:.25rem .3rem">${t.year}</td>
              <td style="color:#2a5a2a;text-align:right;padding:.25rem .3rem;font-weight:600">${t.income}£</td>
              <td style="color:#6a2a2a;text-align:right;padding:.25rem .3rem;font-weight:600">${t.expenses}£</td>
              <td style="font-weight:700;text-align:right;padding:.25rem .3rem;color:${t.final>=0?'#5a3a00':'#8a1a1a'}">${t.final>=0?'+':''}${t.final}£</td>
            </tr>`).join('')}
          </tbody>
        </table>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem">No records yet.</div>`}
      </div>
      <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">

        ${data.manors.map((m,i)=>{

  const header = `<div style="background:linear-gradient(90deg,#1a1006,#120c04);padding:.9rem 1.4rem;display:flex;align-items:center;gap:1.2rem;margin-bottom:1.2rem;border-radius:3px;border:1px solid var(--gold)">

function renderEconomics() {
  const panel = document.getElementById('mainPanel');
  const chars = Object.keys(MANOR_DATA);

  const tabs = chars.map(c =>
    `<button onclick="activeEconTab='${c}';renderEconomics()" style="font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;padding:.45rem 1.1rem;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;background:${activeEconTab===c?'var(--gold)':'#1a1209'};color:${activeEconTab===c?'var(--ink)':'#e0c878'};border-right:1px solid var(--gold)">${c}</button>`
  ).join('');

  const data = MANOR_DATA[activeEconTab];
  const portrait = PORTRAITS[activeEconTab] || null;

  // Summary across all manors
  const allHistory = data.manors.flatMap(m => m.history);
  const years = [...new Set(allHistory.map(h => h.year))].sort();
  const yearTotals = years.map(y => {
    const rows = allHistory.filter(h => h.year === y);
    return {
      year: y,
      income: rows.reduce((s,r) => s + (r.income||0), 0),
      expenses: rows.reduce((s,r) => s + (r.lifestyleCost||0) + (r.improvMaint||0) + (r.family||0) + (r.improvBuild||0) + Math.abs(r.misc||0), 0),
      final: rows.reduce((s,r) => s + (r.final||0), 0),
    };
  });

  // Mini sparkline SVG for each manor history
  function sparkline(history, key, color, w=80, h=24) {
    if (!history.length) return `<span style="color:#3d2a0e;font-style:italic;font-size:.7rem">no data</span>`;
    const vals = history.map(h => h[key]||0);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const range = mx - mn || 1;
    const pts = vals.map((v,i) => {
      const x = (i/(vals.length-1||1))*(w-4)+2;
      const y = h-2 - ((v-mn)/range)*(h-4);
      return `${x},${y}`;
    }).join(' ');
    return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1||1))*(w-4)+2,y=h-2-((v-mn)/range)*(h-4);return `<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;}).join('')}</svg>`;
  }

  // Bar chart SVG for year totals
  function barChart(totals) {
    if (!totals.length) return '';
    const W=280, H=90, pad=24, barW=Math.min(24, (W-pad*2)/totals.length - 4);
    const maxVal = Math.max(...totals.flatMap(t=>[t.income, t.expenses, Math.abs(t.final)])) || 1;
    const scale = (H-20)/maxVal;
    const bars = totals.map((t,i) => {
      const x = pad + i*((W-pad*2)/totals.length) + ((W-pad*2)/totals.length - barW*2 - 2)/2;
      const incH = Math.max(1,t.income*scale), expH = Math.max(1,t.expenses*scale);
      const finColor = t.final>=0?'#b8902a':'#c0392b';
      return `
        <rect x="${x}" y="${H-10-incH}" width="${barW}" height="${incH}" fill="#2a7a2a" opacity="0.9"/>
        <rect x="${x+barW+2}" y="${H-10-expH}" width="${barW}" height="${expH}" fill="#8a1a1a" opacity="0.9"/>
        <text x="${x+barW}" y="${H-2}" text-anchor="middle" font-size="8" fill="#aaa">${t.year}</text>
        <text x="${x+barW}" y="${H-10-Math.max(incH,expH)-3}" text-anchor="middle" font-size="7.5" fill="${finColor}">${t.final>=0?'+':''}${t.final}£</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible;max-height:${H}px">
      <text x="4" y="10" font-size="7" fill="#5a9a5a">■ Income</text>
      <text x="60" y="10" font-size="7" fill="#9a5a5a">■ Expenses</text>
      ${bars}
    </svg>`;
  }

  // Manor cards
  const manorCards = data.manors.map(manor => {
    const lastYear = manor.history[manor.history.length-1];
    const trend = manor.history.length >= 2
      ? manor.history[manor.history.length-1].final - manor.history[manor.history.length-2].final
      : null;
    const trendArrow = trend === null ? '' : trend > 0 ? `<span style="color:#4a9a4a">▲ ${trend>0?'+':''}${trend}£</span>` : trend < 0 ? `<span style="color:#e06060">▼ ${trend}£</span>` : `<span style="color:#888">─ stable</span>`;

    const histRows = manor.history.map(h => {
      const net = h.final;
      const netColor = net >= 0 ? '#80c080' : '#a03030';
      return `<tr>
        <td style="font-family:'Cinzel',serif;font-size:.72rem;color:#3a2008;white-space:nowrap">${h.year}</td>
        <td><span style="font-size:.7rem;color:${h.harvestResult==='Great'||h.harvestResult==='Good'?'#1a5010':h.harvestResult==='Bad'||h.harvestResult==='Poor'?'#8a1a1a':'#5a3a10'}">${h.harvestResult||'—'}</span></td>
        <td style="font-size:.78rem;color:#2a5a2a;text-align:right">${h.income||0}£</td>
        <td style="font-size:.78rem;color:#6a3a2a;text-align:right">${(h.lifestyleCost||0)+(h.improvMaint||0)+(h.family||0)+(h.improvBuild||0)+Math.abs(h.misc||0)}£</td>
        <td style="font-size:.82rem;font-weight:600;color:${netColor};text-align:right">${net>=0?'+':''}${net}£</td>
        <td style="font-size:.7rem;color:#3d2a0e;font-style:italic;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h.notes||''}">${h.notes||''}</td>
      </tr>`;
    }).join('');

    const IMPROV_ICONS2 = {'Dovecote':'🕊','Scriptorium':'📜','Apiary':'🍯','Observatory':'🔭','Brewery':'🍺','Carpenter Shop':'🪚','Coneygarth':'🐇','Dairy':'🥛','Ferry':'⛵','Fish Pond':'🐟','Gambling House':'🎲','Herb Garden':'🌿','Horse Herd (<530)':'🐴','Horse Herd (530+)':'🐴','Inn':'🏠','Jeweller':'💎','Logging Station':'🪵','Lumber Mill':'🪵','Olive Grove':'🫒','Orchard':'🍎','Salt Evaporator':'🧂','Sheep Herd':'🐑','Vineyard':'🍇','Winery':'🍷','Winery, Fine':'🍷'};
    const improvBadges = (manor.improvements||[]).length ? `
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem">
        ${(manor.improvements||[]).map(imp => {
          const inv = INVESTMENT_DATA[imp] || {};
          const icon = IMPROV_ICONS2[imp] || '⚙';
          const notesTip = inv.notes ? ` title="${inv.notes}"` : '';
          return `<div${notesTip} style="cursor:${inv.notes?'help':'default'};background:var(--parchment);border:1px solid var(--parchment-shadow);border-top:2px solid var(--gold);border-radius:3px;padding:.45rem .7rem;min-width:110px;box-shadow:2px 2px 0 rgba(0,0,0,.15)">
            <div style="font-size:1.1rem;margin-bottom:.2rem">${icon}</div>
            <div style="font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.08em;color:#1a1209;font-weight:600;margin-bottom:.25rem">${imp}</div>
            <div style="display:flex;gap:.5rem;align-items:center">
              <span style="font-family:'Cinzel',serif;font-size:.58rem;color:#1a6a10;font-weight:600" title="Annual income roll">↑ ${inv.income||'—'}£</span>
              <span style="color:#c0c0a0;font-size:.55rem">|</span>
              <span style="font-family:'Cinzel',serif;font-size:.58rem;color:#9a2020" title="Annual maintenance">↓ ${inv.maint||'—'}£</span>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    const bonusBadge = manor.bonus
      ? `<span style="font-size:.68rem;padding:.12rem .45rem;background:#1a1a2a;border:1px solid #3a3a5a;border-radius:2px;color:#8080c0">${manor.bonus}</span>`
      : '';

    return `<div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;overflow:hidden;margin-bottom:1rem;box-shadow:2px 2px 0 rgba(0,0,0,.3)">
      <div style="background:var(--ink);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap">
        <div>
          <span style="font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-light)">🏰 ${manor.name}</span>
          <span style="font-size:.72rem;color:#7a5030;margin-left:.6rem;font-style:italic">${manor.type}</span>
          ${manor.knight?`<div style="font-size:.72rem;color:#2a5a18;margin-top:.1rem">⚔ Knight: ${manor.knight}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:.8rem">
          ${lastYear?`<div style="text-align:right"><div style="font-size:.65rem;color:var(--steel);font-family:'Cinzel',serif;letter-spacing:.08em">LAST YEAR</div><div style="font-family:'Cinzel',serif;font-size:1rem;color:${lastYear.final>=0?'#80c080':'#a03030'}">${lastYear.final>=0?'+':''}${lastYear.final}£</div></div>`:''}
          ${trendArrow?`<div style="font-size:.8rem">${trendArrow}</div>`:''}
        </div>
      </div>
      <div style="padding:.8rem 1rem">
        ${manor.notes?`<div style="font-size:.78rem;color:#3d2a0e;font-style:italic;margin-bottom:.6rem">${manor.notes}</div>`:''}
        <div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.6rem">${bonusBadge}${improvBadges}</div>
        ${manor.history.length ? `
        <div style="display:flex;gap:1.2rem;align-items:flex-start;flex-wrap:wrap">
          <div>
            <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--steel);text-transform:uppercase;margin-bottom:.3rem">Income trend</div>
            ${sparkline(manor.history,'income','#80c080')}
          </div>
          <div>
            <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--steel);text-transform:uppercase;margin-bottom:.3rem">Net surplus</div>
            ${sparkline(manor.history,'final','#b8902a')}
          </div>
        </div>
        <div style="overflow-x:auto;margin-top:.8rem">
          <table style="width:100%;border-collapse:collapse;font-size:.78rem">
            <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Year</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Harvest</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Income</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Costs</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Net</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Notes</th>
            </tr></thead>
            <tbody>${histRows}</tbody>
          </table>
        </div>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem;padding:.4rem 0">No yearly records yet.</div>`}
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
  <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;box-shadow:4px 4px 0 rgba(0,0,0,.4);overflow:hidden">
    <div style="background:var(--ink);padding:1rem 1.4rem;display:flex;align-items:center;gap:1.2rem">
      ${portrait?`<img src="${portrait}" style="width:52px;height:52px;object-fit:cover;object-position:top;border-radius:50%;border:2px solid var(--gold)">`:''}
      <div>
        <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold-light);letter-spacing:.08em">⚖ Estate of ${activeEconTab}</div>
        
      </div>
    </div>

    <div style="display:flex;border-bottom:1px solid var(--parchment-shadow);background:rgba(0,0,0,.15);overflow-x:auto">
      ${tabs}
    </div>

    <div style="padding:1.2rem;display:grid;grid-template-columns:1fr 280px;gap:1.2rem;align-items:start;min-width:0">
      <div style="min-width:0">${manorCards}</div>

      <div style="position:sticky;top:1rem;min-width:0;overflow:hidden">
        <div style="background:rgba(0,0,0,.08);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem;margin-bottom:1rem;overflow:hidden">
          <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.8rem">Estate Summary</div>
          ${yearTotals.length ? `
          <div style="margin-bottom:.8rem;overflow:hidden">${barChart(yearTotals)}</div>
          <table style="width:100%;border-collapse:collapse;font-size:.78rem">
            <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:left;padding:.2rem;font-weight:normal">Year</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">In</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">Out</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">Net</th>
            </tr></thead>
            <tbody>
              ${yearTotals.map(t=>`<tr>
                <td style="font-family:'Cinzel',serif;font-size:.72rem;color:#3a2008;padding:.2rem">${t.year}</td>
                <td style="color:#4a9a4a;text-align:right;padding:.2rem">${t.income}£</td>
                <td style="color:#e06060;text-align:right;padding:.2rem">${t.expenses}£</td>
                <td style="font-weight:600;text-align:right;padding:.2rem;color:${t.final>=0?'#5a3a00':'#7a0808'}">${t.final>=0?'+':''}${t.final}£</td>
              </tr>`).join('')}
            </tbody>
          </table>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem">No records yet.</div>`}
        </div>

        <div style="background:rgba(0,0,0,.08);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">
          <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.7rem">Holdings</div>
          ${data.manors.map(m=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid rgba(201,180,138,.15)">
              <div>
                <div style="font-size:.82rem;color:#3d2a0e">🏰 ${m.name}</div>
                <div style="font-size:.68rem;color:#3d2a0e;font-style:italic">${m.type}</div>
              </div>
              <span style="font-size:.65rem;padding:.1rem .4rem;border-radius:2px;background:${m.type.includes('Demesne')?'#1a2a1a':'#2a1a1a'};color:${m.type.includes('Demesne')?'#80a060':'#a06060'};border:1px solid ${m.type.includes('Demesne')?'#3a5a2a':'#5a2a2a'}">${m.type.includes('Enfeoff')?'Enfeoffed':'Demesne'}</span>
            </div>`).join('')}
          <div style="margin-top:.7rem;font-size:.72rem;color:#3d2a0e">
            <div>Manors: <strong style="color:#1a1209">${data.manors.length}</strong></div>
            <div>Improvements: <strong style="color:#1a5010">${data.manors.flatMap(m=>m.improvements||[]).length}</strong></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}


document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();};
document.getElementById('gmSection').style.display='flex';
document.getElementById('gmSection').style.flexDirection='column';
document.addEventListener('DOMContentLoaded', () => {
  render();
});
function setTheme(t){
  document.body.classList.remove('theme-verdant','theme-crimson');
  if(t) document.body.classList.add('theme-'+t);
  localStorage.setItem('pendragon-theme', t);
  ['parchment','verdant','crimson'].forEach(n => {
    const b = document.getElementById('thm-'+n);
    if(b) b.style.outline = (t===n||(t===''&&n==='parchment')) ? '2px solid white' : 'none';
  });
}
// Restore on load
(function(){ const t=localStorage.getItem('pendragon-theme')||''; setTheme(t); })();

</script>
</body>
</html>
