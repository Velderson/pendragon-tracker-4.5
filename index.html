<style>
:root{--ink:#1a1209;--parchment:#f5ead6;--parchment-dark:#e8d5b0;--parchment-shadow:#c9b48a;--blood:#8b1a1a;--gold:#b8902a;--gold-light:#d4aa45;--forest:#2a4a2a;--steel:#5a4a2a;--gold-dim:#8b6914}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a06;background-image:radial-gradient(ellipse at 20% 20%,#1a1209 0%,transparent 60%),url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b8902a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");min-height:100vh;font-family:'Crimson Pro',Georgia,serif;color:var(--ink)}
.site-header{text-align:center;padding:2rem 1rem 1rem;position:relative}
.site-title{font-family:'Cinzel',serif;font-size:clamp(1.5rem,4vw,2.6rem);font-weight:700;color:var(--gold-light);letter-spacing:.12em;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.site-subtitle{font-family:'IM Fell English',serif;font-style:italic;color:#c9b48a;font-size:.95rem;margin-top:.25rem}
.divider-rune{display:flex;align-items:center;justify-content:center;gap:.8rem;margin:.8rem auto 0;max-width:400px}
.divider-rune::before,.divider-rune::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.divider-rune span{color:var(--gold);font-size:.8rem}
.mode-bar{display:flex;justify-content:center;gap:0;margin:1.2rem auto 1.5rem;width:fit-content;border:1px solid var(--gold);border-radius:3px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.6)}
.mode-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;padding:.55rem 1.4rem;background:#1a1209;color:#c9b48a;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase}
.mode-btn+.mode-btn{border-left:1px solid var(--gold)}
.mode-btn.active{background:var(--gold);color:var(--ink);font-weight:600}
.mode-btn:hover:not(.active){background:#2a1f0d;color:var(--gold-light)}
.app{max-width:1300px;margin:0 auto;padding:0 1rem 3rem;display:grid;grid-template-columns:270px 1fr;gap:1.4rem}
.sidebar{background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;padding:1.1rem;height:fit-content;position:sticky;top:1rem;box-shadow:4px 4px 0 rgba(0,0,0,.4)}
.sidebar-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.15em;color:#3a2008;text-transform:uppercase;margin-bottom:.7rem;padding-bottom:.4rem;border-bottom:1px solid var(--parchment-shadow)}
.search-box{width:100%;padding:.45rem .6rem;background:var(--parchment-dark);border:1px solid var(--parchment-shadow);border-radius:2px;font-family:'Crimson Pro',serif;font-size:.92rem;color:var(--ink);margin-bottom:.7rem}
.search-box:focus{outline:none;border-color:var(--gold)}
.search-box::placeholder{color:var(--parchment-shadow);font-style:italic}
.filter-group{margin-bottom:.8rem}
.filter-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;color:var(--steel);text-transform:uppercase;display:block;margin-bottom:.35rem}
.filter-pills{display:flex;flex-wrap:wrap;gap:.25rem}
.pill{font-family:'Crimson Pro',serif;font-size:.78rem;padding:.12rem .5rem;background:var(--parchment-dark);border:1px solid var(--parchment-shadow);border-radius:2px;cursor:pointer;transition:all .15s;color:var(--ink)}
.pill.active{background:var(--blood);color:var(--parchment);border-color:var(--blood)}
.pill:hover:not(.active){border-color:var(--gold);color:var(--gold)}
.npc-list{display:flex;flex-direction:column;gap:.25rem;margin-top:.4rem;max-height:300px;overflow-y:auto}
.npc-list-item{padding:.4rem .55rem;background:var(--parchment-dark);border:1px solid transparent;border-radius:2px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.45rem}
.npc-list-item:hover{border-color:var(--gold)}
.npc-list-item.active{border-color:var(--blood);background:#f5e8d0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.npc-list-name{font-size:.88rem;line-height:1.2}
.npc-list-sub{font-size:.7rem;color:#3a2a10;font-style:italic}
.add-btn{width:100%;margin-top:.8rem;padding:.5rem;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;background:var(--forest);color:var(--parchment);border:1px solid #3a6a3a;border-radius:2px;cursor:pointer;transition:all .2s}
.add-btn:hover{background:#3a6a3a}
.main-panel{display:flex;flex-direction:column;gap:1.4rem}
/* NPC CARD */
.npc-card{background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;box-shadow:4px 4px 0 rgba(0,0,0,.4);overflow:hidden;animation:unfurl .3s ease}
@keyframes unfurl{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card-header{background:var(--ink);padding:1.1rem 1.4rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.card-name{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;color:var(--gold-light);line-height:1.1}
.card-epithet{font-family:'IM Fell English',serif;font-style:italic;color:#c9a86a;font-size:.9rem;margin-top:.1rem}
.card-badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem}
.badge{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.13rem .45rem;border-radius:2px;border:1px solid}
.card-actions{display:flex;gap:.35rem}
.icon-btn{background:rgba(245,234,214,.1);border:1px solid rgba(245,234,214,.2);color:#c9b48a;width:28px;height:28px;border-radius:2px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:rgba(245,234,214,.2);color:var(--gold-light)}
.icon-btn.danger:hover{background:rgba(139,26,26,.4);color:#ff8080;border-color:var(--blood)}
.card-body{padding:1.1rem 1.4rem;display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.card-portrait-wrap{display:flex;gap:0;align-items:stretch;background:#1e140a}
.card-portrait{width:160px;min-width:160px;max-height:240px;object-fit:cover;object-position:top center;border-right:2px solid var(--gold);display:block;flex-shrink:0}
.card-portrait-placeholder{width:160px;min-width:160px;background:rgba(0,0,0,.3);border-right:2px solid rgba(184,144,42,.15);display:flex;align-items:center;justify-content:center;color:rgba(184,144,42,.15);font-size:2.5rem;flex-shrink:0}
.card-header-info{flex:1;padding:1.1rem 1.4rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;background:#1e140a}
.field-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:#4a2c08;display:block;margin-bottom:.18rem}
.field-value{font-size:.95rem;line-height:1.6;color:#110d06}
.field-italic{font-style:italic;color:#4a3a20}
.gm-section{background:#200808;border:1px solid #a02020;border-radius:3px;padding:.9rem 1.1rem;grid-column:1/-1}
.gm-tag{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--blood);text-transform:uppercase;display:flex;align-items:center;gap:.3rem;margin-bottom:.6rem}
.gm-tag::after{content:'';flex:1;height:1px;background:var(--blood);opacity:.4}
.gm-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
/* FAMILY TABS */
.family-section{background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;box-shadow:4px 4px 0 rgba(0,0,0,.4);overflow:hidden;animation:unfurl .3s ease}
.family-tabs{display:flex;background:var(--ink);border-bottom:1px solid var(--gold)}
.family-tab{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:.6rem 1.1rem;cursor:pointer;color:#c9b48a;text-transform:uppercase;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent}
.family-tab.active{color:var(--gold-light);border-bottom-color:var(--gold)}
.family-tab:hover:not(.active){color:var(--gold-light)}
.family-content{padding:1.1rem 1.4rem}
.family-table{width:100%;border-collapse:collapse;font-size:.88rem}
.family-table th{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--steel);text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--parchment-shadow)}
.family-table td{padding:.35rem .5rem;border-bottom:1px solid rgba(201,180,138,.3);vertical-align:top;line-height:1.4}
.family-table tr:hover td{background:rgba(201,180,138,.1)}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.3rem}
/* PLAYER VIEW */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem}
.player-mini{background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;overflow:hidden;box-shadow:3px 3px 0 rgba(0,0,0,.35);transition:transform .15s,box-shadow .15s;cursor:pointer}
.player-mini:hover{transform:translateY(-2px);box-shadow:3px 5px 0 rgba(0,0,0,.4)}
.player-mini-header{background:var(--ink);padding:.75rem .95rem}
.player-mini-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-light)}
.player-mini-role{font-style:italic;color:#c9b48a;font-size:.82rem;margin-top:.08rem}
.player-mini-body{padding:.75rem .95rem}
.player-mini-body p{font-size:.88rem;line-height:1.45;color:var(--ink);margin-bottom:.4rem}
.player-attitude{font-size:.76rem;padding:.12rem .42rem;border-radius:2px;display:inline-block;margin-top:.2rem}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto;padding:2rem 1rem;align-items:flex-start;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;width:100%;max-width:660px;box-shadow:8px 8px 0 rgba(0,0,0,.6);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}}
.modal-header{background:var(--ink);padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cinzel',serif;color:var(--gold-light);font-size:.95rem;letter-spacing:.1em}
.modal-close{background:none;border:none;color:#c9b48a;font-size:1.2rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--gold-light)}
.modal-body{padding:1.2rem;display:flex;flex-direction:column;gap:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.form-group{display:flex;flex-direction:column;gap:.25rem}
.form-group.full{grid-column:1/-1}
.form-group label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--steel)}
.form-group input,.form-group select,.form-group textarea{padding:.42rem .55rem;background:var(--parchment-dark);border:1px solid var(--parchment-shadow);border-radius:2px;font-family:'Crimson Pro',serif;font-size:.92rem;color:var(--ink)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:65px}
.gm-form-section{background:#1a0505;border:1px solid #5a2020;border-radius:3px;padding:.9rem;display:flex;flex-direction:column;gap:.7rem}
.gm-form-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:#e06060;text-transform:uppercase;display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
.gm-form-label::after{content:'';flex:1;height:1px;background:#5a2020}
.gm-form-section label{color:#c09090}
.gm-form-section input,.gm-form-section textarea,.gm-form-section select{background:#2a0808;border-color:#5a2020;color:#f8e8e0}
.modal-footer{padding:.9rem 1.2rem;border-top:1px solid var(--parchment-shadow);display:flex;gap:.55rem;justify-content:flex-end}
.btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:.48rem 1.1rem;border-radius:2px;border:1px solid;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--blood);color:var(--parchment);border-color:var(--blood)}
.btn-primary:hover{background:#a02020}
.btn-secondary{background:transparent;color:var(--steel);border-color:var(--parchment-shadow)}
.btn-secondary:hover{border-color:var(--steel)}
.empty-state{background:var(--parchment);border:2px dashed var(--parchment-shadow);border-radius:4px;padding:3rem 2rem;text-align:center;color:var(--steel)}
.empty-state h3{font-family:'Cinzel',serif;margin-bottom:.5rem;color:var(--ink)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1a1209}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{position:static}.card-body{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}

/* ── THEME VARIANTS ── */

/* ── Verdant: warm forest green parchment ── */
body.theme-verdant {
  --ink: #0e180a;
  --parchment: #eef3e8;
  --parchment-dark: #dde8d4;
  --parchment-shadow: #8aaa78;
  --blood: #6a3010;
  --gold: #8a6a20;
  --gold-light: #b08a30;
  --gold-dim: #6a5018;
  --steel: #3a5428;
  --forest: #1a3a10;
}
body.theme-verdant { background: #06100a; }
body.theme-verdant .npc-card,
body.theme-verdant .sidebar { background: #eef3e8; border-color: #8aaa78; }
body.theme-verdant .card-portrait-wrap,
body.theme-verdant .card-header-info { background: #0e1e08; }
body.theme-verdant .card-name { color: #c8a840; }
body.theme-verdant .card-epithet { color: #b09a60; }
body.theme-verdant .field-label { color: #3a5428; }
body.theme-verdant .field-value { color: #0e180a; }
body.theme-verdant .gm-section { background: #080e04; border-color: #6a3010; }
body.theme-verdant .gm-tag { color: #8a4a18; }
body.theme-verdant .npc-list-item { background: #dde8d4; }
body.theme-verdant .npc-list-item.active { background: #c8d8bc; }
body.theme-verdant .npc-list-sub { color: #3a5428; }

/* ── Crimson: deep red-velvet parchment ── */
body.theme-crimson {
  --ink: #1a0808;
  --parchment: #f5e8e0;
  --parchment-dark: #e8d0c4;
  --parchment-shadow: #c09080;
  --blood: #8b0000;
  --gold: #c89030;
  --gold-light: #e8b040;
  --gold-dim: #a07020;
  --steel: #5a2a1a;
  --forest: #3a1010;
}
body.theme-crimson { background: #100404; }
body.theme-crimson .npc-card,
body.theme-crimson .sidebar { background: #f5e8e0; border-color: #c09080; }
body.theme-crimson .card-portrait-wrap,
body.theme-crimson .card-header-info { background: #200808; }
body.theme-crimson .card-name { color: #e8b040; }
body.theme-crimson .card-epithet { color: #d09060; }
body.theme-crimson .field-label { color: #5a2a1a; }
body.theme-crimson .field-value { color: #1a0808; }
body.theme-crimson .gm-section { background: #0e0000; border-color: #8b0000; }
body.theme-crimson .gm-tag { color: #aa1010; }
body.theme-crimson .npc-list-item { background: #e8d0c4; }
body.theme-crimson .npc-list-item.active { background: #d8b8a8; border-color: #8b0000; }
body.theme-crimson .npc-list-sub { color: #5a2a1a; }

</style>
</head>
<body>
<header class="site-header">

    <button onclick="setTheme('crimson')" title="Crimson"   style="width:18px;height:18px;border-radius:50%;background:#f5e8e0;border:2px solid #8b0000;cursor:pointer;padding:0" id="thm-crimson"></button>

</svg></span></div>
</header>

<div style="display:flex;justify-content:center">
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('player')">⚔ Knights &amp; Ladies</button>
    <button class="mode-btn" onclick="setMode('conflicts')">🕸 Relations</button>
    <button class="mode-btn" onclick="setMode('family')"><span style="filter:grayscale(1);display:inline-block">👥</span> Player Families</button>
    <button class="mode-btn" onclick="setMode('estates')"><span style="filter:grayscale(1);display:inline-block">🏰</span> Estates</button>
    <button class="mode-btn" onclick="setMode('gm')" style="border-left:2px solid var(--gold-dim)"><span style="filter:grayscale(1);display:inline-block">🗝</span> GM Tome</button>
  </div>
</div>

<div class="app" id="appContainer">
  <aside class="sidebar">
    <div class="sidebar-title">Index of Souls</div>
    <input type="text" class="search-box" placeholder="Search by name…" oninput="debouncedRender()" id="searchBox">
    <div class="filter-group">
      <span class="filter-label">Faction / Region</span>
      <div class="filter-pills" id="factionPills"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <div class="filter-pills" id="statusPills">
        <span class="pill active" onclick="toggleStatus(this,'all')">All</span>
        <span class="pill" onclick="toggleStatus(this,'alive')">Alive</span>
        <span class="pill" onclick="toggleStatus(this,'dead')">Dead</span>
        <span class="pill" onclick="toggleStatus(this,'unknown')">Unknown</span>
      </div>
    </div>
    <div class="sidebar-title" style="margin-top:.7rem">Characters</div>
    <div class="npc-list" id="npcList"></div>
    <button class="add-btn" onclick="openModal()">+ Add New NPC</button>
  </aside>
  <main class="main-panel" id="mainPanel"></main>

// ─── FAMILY TREE BUILDER ───
let familySubTab = 'roster'; // 'tree' or 'roster'

// TREE_DATA loaded from pendragon-treedata.js


























































































































































































































// ═══════════════════════════════════════════════════════
//  INTERACTIVE FAMILY TREE  (canvas, draggable nodes)
// ═══════════════════════════════════════════════════════

let ftNodes=[], ftEdges=[], ftAnim=null, ftDrag=null, ftSelected=null;
let ftTick=0, ftCanvas=null, ftCtx=null, ftDpr=1, ftW=900, ftH=660;
// Viewport transform
let ftZoom=1, ftPanX=0, ftPanY=0, ftPanning=false, ftPanStart=null;
// Expanded parent nodes (click to reveal siblings)
let ftExpanded = new Set();

const BW=82, BH=38; // node box size

function ftColor(status,isPC,illegitimate,isSpouse){
  if(isPC)              return {fill:'#1a0d00',stroke:'#f0c030',text:'#fff0a0',sw:2};
  if(isSpouse)          return {fill:'#0d0a18',stroke:'#a090d0',text:'#d0c8f0',sw:1.5};
  if(illegitimate)      return {fill:'#100808',stroke:'#885050',text:'#c09080',sw:1,dash:true};
  if(status==='dead')   return {fill:'#0d0000',stroke:'#ff6060',text:'#ffaaaa',sw:1.5};
  if(status==='unknown')return {fill:'#080810',stroke:'#8888cc',text:'#ccccff',sw:1};
  if(status==='ghost')  return {fill:'#0a0a08',stroke:'#888866',text:'#cccc99',sw:1};
  return                       {fill:'#0a0800',stroke:'#c8a040',text:'#ffe8a0',sw:1};
}

// Convert screen coords → world coords
function ftScreen2World(sx,sy){
  return {x:(sx-ftPanX)/ftZoom, y:(sy-ftPanY)/ftZoom};
}

function buildFamilyTree(charName){
  cancelAnimationFrame(ftAnim);
  ftNodes=[]; ftEdges=[]; ftSelected=null; ftTick=0;
  ftZoom=1; ftPanX=0; ftPanY=0;
  const data=TREE_DATA[charName];
  if(!data) return;

  // ── Determine which nodes to show ─────────────────────────────
  // Core: PC, father, mother, spouse(s), children
  // Expanded: if a parent node is in ftExpanded, also show that parent's siblings
  const allNodes = data.generations.flat();
  const byId = id => allNodes.find(n=>n.id===id);

  const pcNode = allNodes.find(n=>n.pc);
  const fatherNode = allNodes.find(n=>n.isfather);
  const motherNode = allNodes.find(n=>n.ismother);

  // Always-visible set
  const coreIds = new Set();
  if(pcNode) coreIds.add(pcNode.id);
  if(fatherNode) coreIds.add(fatherNode.id);
  if(motherNode) coreIds.add(motherNode.id);
  // Spouses of PC
  allNodes.filter(n=>n.spouseOf==='pc').forEach(n=>coreIds.add(n.id));
  // Children of PC (direct parentId===pc), excluding illegitimate
  allNodes.filter(n=>n.parentId==='pc' && !n.illegitimate).forEach(n=>coreIds.add(n.id));

  // Expanded: siblings of clicked parent
  ftExpanded.forEach(parentId=>{
    const parent = byId(parentId);
    if(!parent) return;
    // All nodes sharing the same grandparent (siblings)
    const gpId = parent.parentId;
    if(gpId){
      allNodes.filter(n=>n.parentId===gpId).forEach(n=>coreIds.add(n.id));
      // Also show the grandparent as a ghost anchor
      coreIds.add(gpId);
    }
  });

  // Build visible nodes with generation recalculation
  // Assign generations: gp=0, parents=1, pc/siblings=2, children=3
  const genOf = id => {
    const n = byId(id);
    if(!n) return 2;
    if(n.isfather||n.ismother) return 1;
    if(n.pc||n.spouseOf==='pc') return 2;
    // Is it a grandparent (parent of father/mother)?
    const fathGp = fatherNode?.parentId, mothGp = motherNode?.parentId;
    if(id===fathGp||id===mothGp) return 0;
    // Is it a sibling of PC (same gen as PC, parentId = father)?
    if(n.parentId===fatherNode?.id||n.parentId===motherNode?.id) return 2;
    // Child of PC
    if(n.parentId==='pc'||n.parentId===pcNode?.id) return 3;
    // Uncle/aunt (sibling of parent, parentId = grandparent)
    const fathGpId = fatherNode?.parentId, mothGpId = motherNode?.parentId;
    if((fathGpId&&n.parentId===fathGpId)||(mothGpId&&n.parentId===mothGpId)) return 1;
    // Cousin (child of uncle/aunt — one level below uncle)
    const uncles = allNodes.filter(u=>(fathGpId&&u.parentId===fathGpId)||(mothGpId&&u.parentId===mothGpId));
    if(uncles.find(u=>u.id===n.parentId)) return 2;
    return 2;
  };

  const gc = 4; // max generations
  const visibleNodes = allNodes.filter(n=>coreIds.has(n.id));

  visibleNodes.forEach((n,ni)=>{
    const gi = genOf(n.id);
    const genNodes = visibleNodes.filter(x=>genOf(x.id)===gi);
    const idx = genNodes.indexOf(n);
    const xBase = ftW*0.1 + (idx/Math.max(genNodes.length-1,1))*ftW*0.8;
    const yBase = ftH*0.06 + (gi/Math.max(gc-1,1))*ftH*0.86;
    // Spouse: place next to PC
    const xOff = n.spouseOf==='pc' ? 110 : (Math.random()-.5)*20;
    ftNodes.push({
      id:n.id, label:n.label||'', role:n.role||'',
      status:n.ghost?'ghost':(n.status||'alive'),
      age:n.age||'', glory:n.glory||'',
      pc:!!n.pc, ghost:!!n.ghost, gi,
      illegitimate:!!n.illegitimate,
      isSpouse: !!(n.spouseOf==='pc'),
      expandable: !!(n.isfather||n.ismother),
      expanded: ftExpanded.has(n.id),
      x:xBase+xOff, y:yBase+(Math.random()-.5)*15,
      vx:0,vy:0,pinned:false,
      spouseOf:n.spouseOf||null, parentId:n.parentId||null,
      isfather:!!n.isfather, ismother:!!n.ismother,
    });
  });

  const nodeById=id=>ftNodes.find(n=>n.id===id);

  ftNodes.forEach(n=>{
    if(n.parentId&&nodeById(n.parentId)) ftEdges.push({a:n.parentId,b:n.id,type:'parent',illegitimate:n.illegitimate});
    if(n.spouseOf&&nodeById(n.spouseOf)&&!ftEdges.find(e=>e.type==='spouse'&&((e.a===n.id&&e.b===n.spouseOf)||(e.a===n.spouseOf&&e.b===n.id))))
      ftEdges.push({a:n.spouseOf,b:n.id,type:'spouse'});
  });

  // Father-PC edge & father-mother couple
  const fid=ftNodes.find(n=>n.isfather)?.id;
  const mid=ftNodes.find(n=>n.ismother)?.id;
  const pid=ftNodes.find(n=>n.pc)?.id;
  if(fid&&pid&&!ftEdges.find(e=>e.a===fid&&e.b===pid)) ftEdges.push({a:fid,b:pid,type:'parent'});
  if(fid&&mid&&!ftEdges.find(e=>e.type==='couple')) ftEdges.push({a:fid,b:mid,type:'couple'});

  // Sibling ordering
  ftNodes.forEach(n=>{ n.sibRank=null; n.sibGroup=null; n.sibTotal=0; });
  const parentIds=[...new Set(ftEdges.filter(e=>e.type==='parent').map(e=>e.a))];
  parentIds.forEach(pid=>{
    const kids=ftEdges.filter(e=>e.type==='parent'&&e.a===pid).map(e=>ftNodes.find(n=>n.id===e.b)).filter(Boolean);
    if(kids.length<2) return;
    kids.sort((a,b)=>(parseInt(b.age)||0)-(parseInt(a.age)||0));
    kids.forEach((k,i)=>{k.sibRank=i;k.sibGroup=pid;k.sibTotal=kids.length;});
  });

  ftDrawTree();
  ftRunSim();
}

function ftRunSim(){
  ftTick=0;
  // Build node lookup map once per sim run (nodes don't change mid-sim)
  const _simNodeMap = new Map(ftNodes.map(n=>[n.id,n]));
  function step(){
    ftTick++;
    const cool=Math.max(0.02,1-ftTick/350);
    ftNodes.forEach(n=>{n.fx=0;n.fy=0;});

    // Base repulsion — stronger when something is selected so siblings spread
    const baseRep = ftSelected ? 5500 : 3800;
    for(let i=0;i<ftNodes.length;i++) for(let j=i+1;j<ftNodes.length;j++){
      const a=ftNodes[i],b=ftNodes[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy));
      // Extra push between same-generation nodes when close
      const sameGen = a.gi===b.gi;
      const rep = sameGen ? baseRep*1.4 : baseRep;
      const s=rep/(d*d);
      a.fx-=dx/d*s; a.fy-=dy/d*s; b.fx+=dx/d*s; b.fy+=dy/d*s;
    }

    // Strong child separation: find all direct children of selected node and push apart
    if(ftSelected){
      // gather children of selected node — use Set for O(1) lookup
      const childIdSet = new Set(ftEdges
        .filter(e=>e.type==='parent'&&e.a===ftSelected.id)
        .map(e=>e.b));
      const children = ftNodes.filter(n=>childIdSet.has(n.id));
      // push children apart from each other with strong force
      for(let i=0;i<children.length;i++) for(let j=i+1;j<children.length;j++){
        const a=children[i],b=children[j];
        const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy));
        const minDist=BW*2.2;
        if(d<minDist){
          const push=(minDist-d)*0.9;
          a.fx-=dx/d*push; a.fy-=dy/d*push*0.1;
          b.fx+=dx/d*push; b.fy+=dy/d*push*0.1;
        }
      }
      // also push all same-gen nodes apart (gentler)
      const selGen=ftSelected.gi+1; // children's generation
      const genNodes=ftNodes.filter(n=>n.gi===selGen);
      for(let i=0;i<genNodes.length;i++) for(let j=i+1;j<genNodes.length;j++){
        const a=genNodes[i],b=genNodes[j];
        const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy));
        if(d<BW*1.8){
          const push=(BW*1.8-d)*0.4;
          a.fx-=dx/d*push; b.fx+=dx/d*push;
        }
      }
    }

    ftEdges.forEach(e=>{
      const a=_simNodeMap.get(e.a),b=_simNodeMap.get(e.b);
      if(!a||!b) return;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy));
      const ideal=e.type==='spouse'||e.type==='couple'?95:140;
      const f=(d-ideal)*0.045;
      a.fx+=dx/d*f; a.fy+=dy/d*f; b.fx-=dx/d*f; b.fy-=dy/d*f;
    });

    // Use reduce instead of spread+Math.max (avoids stack overflow risk on large arrays)
    const gc=ftNodes.reduce((m,n)=>n.gi>m?n.gi:m,0)+1;
    ftNodes.forEach(n=>{
      const ty=ftH*0.06+(n.gi/Math.max(gc-1,1))*ftH*0.86;
      n.fy+=(ty-n.y)*0.14;
      // PC node gets a strong centering pull; all others get a gentle drift
      if(n.pc) n.fx+=(ftW/2-n.x)*0.18;
      else n.fx+=(ftW/2-n.x)*0.004;
    });

    // Sibling ordering (groups precomputed outside step)
    _sibGroups.forEach(kids=>{
      if(kids.length<2) return;
      const cx=kids.reduce((s,k)=>s+k.x,0)/kids.length;
      let minX=kids[0].x,maxX=kids[0].x;
      for(let ki=1;ki<kids.length;ki++){if(kids[ki].x<minX)minX=kids[ki].x;if(kids[ki].x>maxX)maxX=kids[ki].x;}
      const spacing=Math.max(BW*1.35,(maxX-minX)/(kids.length-1)||BW*1.35);
      const totalW=(kids.length-1)*spacing;
      kids.forEach((k,i)=>{k.fx+=(cx-totalW/2+i*spacing-k.x)*0.18;});
    });

    ftNodes.forEach(n=>{
      if(n.pinned||ftDrag?.node===n) return;
      n.vx=(n.vx+n.fx)*0.65*cool; n.vy=(n.vy+n.fy)*0.65*cool;
      n.x=Math.max(60,Math.min(ftW-60,n.x+n.vx));
      n.y=Math.max(25,Math.min(ftH-25,n.y+n.vy));
    });

    ftDrawTree();
    if(ftTick<400) ftAnim=requestAnimationFrame(step);
  }
  // Precompute sibling groups once (they don't change during sim)
  const _sibGroupMap = new Map();
  ftNodes.forEach(n=>{
    if(!n.sibGroup) return;
    if(!_sibGroupMap.has(n.sibGroup)) _sibGroupMap.set(n.sibGroup,[]);
    _sibGroupMap.get(n.sibGroup).push(n);
  });
  const _sibGroups = [..._sibGroupMap.values()].map(g=>g.slice().sort((a,b)=>a.sibRank-b.sibRank));
  ftAnim=requestAnimationFrame(step);
}

function ftDrawTree(){
  if(!ftCtx) return;
  const ctx=ftCtx;
  ctx.clearRect(0,0,ftW*ftDpr,ftH*ftDpr);

  // Background
  ctx.fillStyle='#000000'; ctx.fillRect(0,0,ftW*ftDpr,ftH*ftDpr);

  ctx.save();
  ctx.scale(ftDpr,ftDpr);
  // Apply pan+zoom
  ctx.translate(ftPanX,ftPanY);
  ctx.scale(ftZoom,ftZoom);

  // ── Edges ──
  // Build a fast id→node map once per draw call instead of O(n) find() per edge
  const _nodeMap = new Map(ftNodes.map(n=>[n.id,n]));
  ftEdges.forEach(e=>{
    const a=_nodeMap.get(e.a),b=_nodeMap.get(e.b);
    if(!a||!b) return;
    const sel=ftSelected&&(ftSelected.id===a.id||ftSelected.id===b.id);
    const dim=ftSelected&&!sel;
    ctx.globalAlpha=dim?0.12:sel?0.95:0.55;
    if(e.type==='spouse'||e.type==='couple'){
      ctx.strokeStyle='#b8962a'; ctx.lineWidth=(sel?2:1.2)/ftZoom; ctx.setLineDash([4/ftZoom,3/ftZoom]);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      const my=(a.y+b.y)/2;
      ctx.strokeStyle=sel?'#d4a017':'#5a4010'; ctx.lineWidth=(sel?1.8:1)/ftZoom;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y+BH/2); ctx.lineTo(a.x,my);
      ctx.lineTo(b.x,my);        ctx.lineTo(b.x,b.y-BH/2);
      ctx.stroke();
    }
  });
  ctx.globalAlpha=1;

  // ── Nodes ──
  // Precompute which nodes are connected to selected (avoids O(edges) per node)
  const _connectedIds = ftSelected
    ? new Set(ftEdges.flatMap(e=>(e.a===ftSelected.id||e.b===ftSelected.id)?[e.a,e.b]:[]))
    : null;
  ftNodes.forEach(n=>{
    const col=ftColor(n.status,n.pc,n.illegitimate,n.isSpouse);
    const sel=ftSelected&&ftSelected.id===n.id;
    const conn=_connectedIds&&_connectedIds.has(n.id);
    const dim=ftSelected&&!sel&&!conn;
    ctx.globalAlpha=dim?0.4:n.ghost?0.75:1;

    const nx=n.x-BW/2, ny=n.y-BH/2;

    // Shadow for depth
    if(!dim&&!n.ghost){
      ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=4/ftZoom; ctx.shadowOffsetY=2/ftZoom;
    }
    ctx.fillStyle=col.fill;
    ctx.strokeStyle=sel?'#ffd700':col.stroke;
    ctx.lineWidth=(sel?2:col.sw)/ftZoom;
    // Dashed border for illegitimate
    if(col.dash) ctx.setLineDash([3/ftZoom,2/ftZoom]);
    ctx.beginPath(); ctx.roundRect(nx,ny,BW,BH,3); ctx.fill(); ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

    // Dead X
    if(n.status==='dead'&&!n.ghost){
      ctx.save(); ctx.globalAlpha=(dim?0.35:1)*0.18;
      ctx.strokeStyle='#993333'; ctx.lineWidth=0.7/ftZoom;
      ctx.beginPath(); ctx.moveTo(nx+3,ny+3); ctx.lineTo(nx+BW-3,ny+BH-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(nx+BW-3,ny+3); ctx.lineTo(nx+3,ny+BH-3); ctx.stroke();
      ctx.restore();
    }

    // Expand indicator on parent nodes (▸ = click to show family)
    if(n.expandable){
      ctx.save();
      ctx.font=`bold ${7/ftZoom}px sans-serif`;
      ctx.fillStyle = n.expanded ? '#80c080' : '#c0a040';
      ctx.globalAlpha=(dim?0.4:1)*0.9;
      ctx.textAlign='left';
      ctx.fillText(n.expanded?'▾':'▸', nx+2, ny+9);
      ctx.restore();
    }

    // PC star
    if(n.pc){
      ctx.font=`bold ${10/ftZoom}px serif`;
      ctx.fillStyle='#ffd700'; ctx.textAlign='right';
      ctx.fillText('★',nx+BW-3,ny+11);
    }

    // Text — scale font with zoom so it stays crisp
    const fScale=1/ftZoom;
    ctx.textAlign='center';
    ctx.globalAlpha=dim?0.4:n.ghost?0.75:1;

    const nameLines=n.label.split('\n');
    if(nameLines.length>1){
      ctx.font=`${7.5*fScale}px Cinzel,serif`; ctx.fillStyle=col.text;
      ctx.fillText(nameLines[0],n.x,ny+12); ctx.fillText(nameLines[1]||'',n.x,ny+22);
    } else {
      // Name
      ctx.font=`${n.pc?'bold ':''  }${9*fScale}px Cinzel,serif`; ctx.fillStyle=col.text;
      ctx.fillText(n.label,n.x,ny+13);
      // Role
      if(n.role&&!n.ghost){
        ctx.font=`italic ${7*fScale}px serif`;
        ctx.globalAlpha=(dim?0.4:1)*1.0;   ctx.fillStyle=col.text;
        ctx.fillText(n.role.split('·')[0].trim().slice(0,20),n.x,ny+23);
      }
      // Age/glory
      const sub=[n.age?'Age '+n.age:'',n.glory?'✦'+n.glory:''].filter(Boolean).join('  ');
      if(sub){
        ctx.font=`${6*fScale}px serif`;
        ctx.globalAlpha=(dim?0.4:1)*0.85;  ctx.fillStyle=col.text;
        ctx.fillText(sub,n.x,ny+33);
      }
    }
  });

  ctx.restore(); // end zoom/pan transform

  // ── Tooltip — drawn in screen space (outside zoom transform) ──
  if(ftSelected){
    ctx.save(); ctx.scale(ftDpr,ftDpr);
    const n=ftSelected, col=ftColor(n.status,n.pc,n.illegitimate,n.isSpouse);
    // Compute screen position of node
    const sx=n.x*ftZoom+ftPanX, sy=n.y*ftZoom+ftPanY;
    const lines=[
      n.label,
      n.role||'',
      n.age?'Age '+n.age:'',
      n.glory?'Glory '+n.glory:'',
      n.status==='dead'?'† Deceased':''
    ].filter(Boolean);
    const pw=160,lh=15,pad=9,ph=lines.length*lh+pad*2;
    const px=Math.min(ftW-pw-8,Math.max(8,sx-pw/2));
    const py=Math.min(ftH-ph-8,Math.max(8,sy+(BH/2)*ftZoom+6));
    ctx.globalAlpha=0.95;
    ctx.fillStyle='#1a1005'; ctx.strokeStyle=col.stroke; ctx.lineWidth=1.5;
    ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,4); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    lines.forEach((l,i)=>{
      ctx.font=i===0?'bold 10px Cinzel,serif':'8.5px serif';
      ctx.fillStyle=col.text; ctx.textAlign='left';
      ctx.globalAlpha=i===0?0.98:0.8;
      ctx.fillText(l,px+pad,py+pad+11+i*lh);
    });
    ctx.restore();
  }

  // ── Zoom indicator ──
  ctx.save(); ctx.scale(ftDpr,ftDpr);
  ctx.font='9px serif'; ctx.fillStyle='rgba(180,160,100,0.45)';
  ctx.textAlign='right';
  ctx.fillText(Math.round(ftZoom*100)+'%', ftW-8, ftH-6);
  ctx.restore();
}

function ftZoomBy(delta, cx, cy){
  // cx,cy: zoom center in screen coords
  const oldZoom=ftZoom;
  ftZoom=Math.max(0.3,Math.min(3.5,ftZoom*delta));
  // Adjust pan so zoom center stays fixed
  const wx=cx===undefined?ftW/2:cx;
  const wy=cy===undefined?ftH/2:cy;
  ftPanX=wx-(wx-ftPanX)*(ftZoom/oldZoom);
  ftPanY=wy-(wy-ftPanY)*(ftZoom/oldZoom);
  ftDrawTree();
}

function ftResetView(){
  ftZoom=1; ftPanX=0; ftPanY=0; ftDrawTree();
}

function initFamilyTreeCanvas(charName){
  ftCanvas=document.getElementById('familyTreeCanvas');
  if(!ftCanvas) return;
  const cont=ftCanvas.parentElement;
  ftDpr=window.devicePixelRatio||1;
  ftW=cont.clientWidth||900;
  ftH=Math.max(580,Math.round(ftW*0.6));
  ftCanvas.width=ftW*ftDpr; ftCanvas.height=ftH*ftDpr;
  ftCanvas.style.width=ftW+'px'; ftCanvas.style.height=ftH+'px';
  ftCtx=ftCanvas.getContext('2d');

  // Inject zoom controls above canvas if not already there
  if(!document.getElementById('ftZoomControls')){
    const bar=document.createElement('div');
    bar.id='ftZoomControls';
    bar.style.cssText='display:flex;gap:6px;align-items:center;padding:6px 10px;background:#0a0a0a;border-bottom:1px solid #333;';
    bar.innerHTML=`
      <button onclick="ftZoomBy(1.25)" title="Zoom in" style="background:#111;border:1px solid #555;color:#eee;width:28px;height:28px;border-radius:3px;cursor:pointer;font-size:15px;line-height:1;transition:background .1s">+</button>
      <button onclick="ftZoomBy(0.8)"  title="Zoom out" style="background:#111;border:1px solid #555;color:#eee;width:28px;height:28px;border-radius:3px;cursor:pointer;font-size:15px;line-height:1;transition:background .1s">−</button>
      <button onclick="ftResetView()"  title="Reset view" style="background:#111;border:1px solid #555;color:#eee;padding:0 10px;height:28px;border-radius:3px;cursor:pointer;font-size:10px;font-family:Cinzel,serif;letter-spacing:.05em;transition:background .1s">Reset</button>
      <span style="font-size:9px;color:#888;font-family:serif;margin-left:6px">Scroll to zoom · Drag empty space to pan · Drag nodes to move · Dbl-click to unpin</span>`;
    cont.insertBefore(bar, ftCanvas);
  }

  buildFamilyTree(charName);

  // ── Coordinate helpers ──
  function scrPos(e){
    const r=ftCanvas.getBoundingClientRect();
    const cl=e.touches?e.touches[0]:e;
    return {x:(cl.clientX-r.left)*(ftW/r.width), y:(cl.clientY-r.top)*(ftH/r.height)};
  }
  function worldPos(e){ const s=scrPos(e); return ftScreen2World(s.x,s.y); }
  function hitNode(wx,wy){ return ftNodes.slice().reverse().find(n=>Math.abs(n.x-wx)<BW/2+2&&Math.abs(n.y-wy)<BH/2+2); }

  // ── Scroll to zoom ──
  ftCanvas.addEventListener('wheel', e=>{
    e.preventDefault();
    const {x,y}=scrPos(e);
    ftZoomBy(e.deltaY<0?1.12:1/1.12, x, y);
  },{passive:false});

  // ── Mouse ──
  let mouseBtn=0, _mouseDownPos=null;
  ftCanvas.addEventListener('mousedown', e=>{
    mouseBtn=e.button;
    const {x,y}=scrPos(e);
    _mouseDownPos={x,y};
    if(e.button===1||e.button===2){ // middle or right drag = pan
      ftPanning=true; ftPanStart={x:x-ftPanX, y:y-ftPanY};
      ftCanvas.style.cursor='move'; e.preventDefault(); return;
    }
    const {x:wx,y:wy}=ftScreen2World(x,y);
    const n=hitNode(wx,wy);
    if(n){
      ftDrag={node:n,ox:wx-n.x,oy:wy-n.y};
      ftSelected=n; ftCanvas.style.cursor='grabbing';
      ftRunSim(); // restart sim so siblings spread apart
    } else {
      // left-click on empty space = pan (always, easier than middle-click)
      ftPanning=true; ftPanStart={x:x-ftPanX, y:y-ftPanY};
      ftCanvas.style.cursor='move';
      const hadSel=!!ftSelected;
      ftSelected=null;
      if(hadSel){ ftRunSim(); } // re-settle when deselected
    }
    ftDrawTree();
  });
  ftCanvas.addEventListener('mousemove', e=>{
    const {x,y}=scrPos(e);
    if(ftPanning&&ftPanStart){ ftPanX=x-ftPanStart.x; ftPanY=y-ftPanStart.y; ftDrawTree(); return; }
    if(!ftDrag) return;
    const {x:wx,y:wy}=ftScreen2World(x,y);
    ftDrag.node.x=wx-ftDrag.ox; ftDrag.node.y=wy-ftDrag.oy; ftDrawTree();
  });
  ftCanvas.addEventListener('mouseup', e=>{
    if(ftPanning){ ftPanning=false; ftPanStart=null; ftCanvas.style.cursor='grab'; return; }
    if(ftDrag){
      const {x,y}=scrPos(e);
      const moved = _mouseDownPos ? Math.hypot(x-_mouseDownPos.x, y-_mouseDownPos.y) : 99;
      const n=ftDrag.node;
      ftDrag.node.pinned=true; ftDrag=null; ftCanvas.style.cursor='grab';
      // If barely moved = click, toggle expand on parent nodes
      if(moved < 5 && n.expandable){
        if(ftExpanded.has(n.id)) ftExpanded.delete(n.id);
        else ftExpanded.add(n.id);
        buildFamilyTree(charName);
      }
    }
  });
  ftCanvas.addEventListener('mouseleave',()=>{ ftDrag=null; ftPanning=false; ftCanvas.style.cursor='grab'; });
  ftCanvas.addEventListener('contextmenu',e=>e.preventDefault());
  ftCanvas.addEventListener('dblclick',e=>{
    const {x,y}=scrPos(e), {x:wx,y:wy}=ftScreen2World(x,y);
    const n=hitNode(wx,wy);
    if(n){ n.pinned=false; if(ftTick>=400) ftRunSim(); }
  });

  // ── Touch ──
  let lastTouchDist=0;
  ftCanvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===2){
      lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      ftDrag=null; return;
    }
    const {x:wx,y:wy}=worldPos(e);
    const n=hitNode(wx,wy);
    if(n){ftDrag={node:n,ox:wx-n.x,oy:wy-n.y};ftSelected=n;ftDrawTree();}
  },{passive:false});
  ftCanvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(lastTouchDist) ftZoomBy(d/lastTouchDist);
      lastTouchDist=d; return;
    }
    if(!ftDrag) return;
    const {x:wx,y:wy}=worldPos(e);
    ftDrag.node.x=wx-ftDrag.ox; ftDrag.node.y=wy-ftDrag.oy; ftDrawTree();
  },{passive:false});
  ftCanvas.addEventListener('touchend',()=>{
    if(ftDrag){ftDrag.node.pinned=true;ftDrag=null;} lastTouchDist=0;
  });
}

function renderFamilyRoster(charName) {
  const members = FAMILIES[charName] || [];
  const skip = ['Status','Relation','Role','Name','Glory','Age','Misc'];
  const valid = members.filter(m => !skip.includes(m.relation) && !skip.includes(m.status) && (m.name || m.relation));

  const sections = []; let current = {title:'Family', rows:[]};
  const sectionHeaders = ['Family','Entourage','Manors','Player Character'];
  valid.forEach(m => {
    if (sectionHeaders.includes(m.status) && !m.name && !m.relation) {
      if (current.rows.length) sections.push(current);
      current = {title: m.status, rows: []};
    } else { current.rows.push(m); }
  });
  if (current.rows.length) sections.push(current);

  const tableRows = sections.map(sec => {
    const hdr = `<tr><td colspan="5" style="padding:.5rem .5rem .25rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--steel);border-bottom:1px solid var(--parchment-shadow);background:rgba(201,180,138,.15)">${sec.title}</td></tr>`;
    const rows = sec.rows.map(m => {
      const stColor = m.status==='Dead'?'#a03030':m.status==='Alive'||m.status==='alive'?'#4a8a4a':'#c0c060';
      return `<tr>
        <td><span class="status-dot" style="background:${stColor}"></span>${m.status||''}</td>
        <td>${m.relation||''}</td>
        <td>${m.name||'<span style="color:#3a2008;font-style:italic">unnamed</span>'}</td>
        <td>${m.role||''}</td>
        <td style="font-size:.8rem;color:#3d2a0e">${[m.age?'Age '+m.age:'',m.glory?'Glory '+m.glory:'',m.misc||''].filter(Boolean).join(' · ')}</td>
      </tr>`;
    }).join('');
    return hdr + rows;
  }).join('');

  return `<table class="family-table" style="width:100%;border-collapse:collapse">
    <thead><tr><th>Status</th><th>Relation</th><th>Name</th><th>Role</th><th>Notes</th></tr></thead>
    <tbody>${tableRows}</tbody>
  </table>`;
}

  if(editingId){
    const idx=npcs.findIndex(n=>n.id===editingId);
    npcs[idx]={...npcs[idx],...data};selectedId=editingId;
  }else{
    data.id=Date.now();npcs.push(data);selectedId=data.id;
  }

function deleteNPC(id){
  if(!confirm('Remove this character from the chronicle?'))return;
  npcs=npcs.filter(n=>n.id!==id);
  if(selectedId===id)selectedId=npcs[0]?.id||null;
  saveCustom();render();
}

function involvedNpcSelectOpts(){

}

let editingRelId = null;
function openAddRelModal(relId){
  editingRelId = relId || null;
  document.getElementById('relModalTitle').textContent = relId ? 'Edit Relationship' : 'Add Relationship';
  document.getElementById('relDeleteBtn').style.display = relId ? 'inline-block' : 'none';
  // Refresh selects with latest NPC list
  ['rel_a','rel_b'].forEach(id => {
    document.getElementById(id).innerHTML = involvedNpcSelectOpts();
  });
  if(relId){
    const r = RELATIONS.find(x=>x.id===relId);
    if(r){
      document.getElementById('rel_a').value = r.a;
      document.getElementById('rel_b').value = r.b;
      document.getElementById('rel_type').value = r.type;
      document.getElementById('rel_label').value = r.label||'';
      const scopeEl = document.getElementById('rel_scope');
      [...scopeEl.options].forEach(o => o.selected = (r.scope||[]).includes(o.value));
    }
  } else {
    document.getElementById('rel_a').value='';
    document.getElementById('rel_b').value='';
    document.getElementById('rel_type').value='hostile';
    document.getElementById('rel_label').value='';
  }
  const ov = document.getElementById('relModalOverlay');
  ov.style.display='flex';
}
function closeRelModal(){ document.getElementById('relModalOverlay').style.display='none'; editingRelId=null; }
function saveRelation(){
  const a=document.getElementById('rel_a').value.trim();
  const b=document.getElementById('rel_b').value.trim();
  if(!a||!b||a===b){alert('Please select two different characters.');return;}
  const type=document.getElementById('rel_type').value;
  const label=document.getElementById('rel_label').value.trim();
  const scopeEl=document.getElementById('rel_scope');
  const scope=[...scopeEl.options].filter(o=>o.selected).map(o=>o.value);
  if(editingRelId){
    const idx=RELATIONS.findIndex(r=>r.id===editingRelId);
    RELATIONS[idx]={...RELATIONS[idx],a,b,type,label,scope};
  } else {
    RELATIONS.push({id:'r'+Date.now(),a,b,type,label,scope});
  }
  saveRelations(); closeRelModal(); renderConflicts();
}
function deleteRelation(){
  if(!editingRelId)return;
  if(!confirm('Remove this relationship?'))return;
  RELATIONS=RELATIONS.filter(r=>r.id!==editingRelId);
  saveRelations(); closeRelModal(); renderConflicts();
}

function toggleConflictScope(s){
  const i=conflictFilter.scopes.indexOf(s);
  if(i>=0) conflictFilter.scopes.splice(i,1); else conflictFilter.scopes.push(s);
  renderConflicts();
}
function toggleConflictType(t){
  const i=conflictFilter.types.indexOf(t);
  if(i>=0) conflictFilter.types.splice(i,1); else conflictFilter.types.push(t);
  renderConflicts();
}

// ── Force-directed graph engine ──
let webNodes=[], webEdges=[], webAnim=null, webDrag=null, webSelected=null;

function initConflictWeb(){
  const canvas = document.getElementById('conflictCanvas');
  if(!canvas) return;

  const container = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const W = container.clientWidth || 900;
  const H = Math.max(720, container.clientHeight || 720);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx2 = canvas.getContext('2d');
  ctx2.scale(dpr, dpr);

  // Filter relations
  let rels = RELATIONS.filter(r => {
    if(conflictFilter.scopes.length && !r.scope.some(s=>conflictFilter.scopes.includes(s))) return false;
    if(conflictFilter.types.length && !conflictFilter.types.includes(r.type)) return false;
    if(conflictFilter.focusNpc && r.a!==conflictFilter.focusNpc && r.b!==conflictFilter.focusNpc) return false;
    return true;
  });

  // Build node set from filtered relations
  const nodeNames = [...new Set(rels.flatMap(r=>[r.a,r.b]))];
  webNodes = nodeNames.map(name => {
    const npc = npcs.find(n=>n.name===name);
    const glory = parseInt(npc?.glory)||0;
    const r = 10 + Math.min(glory/800, 12);
    const faction = npc?.faction||'Other';
    const existing = (webNodes||[]).find(n=>n.name===name);
    return {
      name, faction,
      x: existing ? existing.x : W/2 + (Math.random()-.5)*W*0.6,
      y: existing ? existing.y : H/2 + (Math.random()-.5)*H*0.5,
      vx:0, vy:0, r,
      color: FACTION_NODE_COLORS[faction]||'#2a2a2a',
      portrait: PORTRAITS[name]||null,
      pinned: existing?.pinned||false,
      _img: existing?._img||null,
    };
  });
  webEdges = rels;

  // Preload portrait images for canvas
  webNodes.forEach(node => {
    if(node.portrait && !node._img){
      const img = new Image();
      img.onload = ()=>{ node._img=img; drawWeb(); };
      img.src = node.portrait;
    }
  });

  // Stop any previous animation
  if(webAnim) cancelAnimationFrame(webAnim);

  // Canvas interaction
  canvas.onmousedown = e => {
    const {x,y} = canvasPos(e,canvas);
    const hit = webNodes.find(n => dist(n,{x,y})<n.r+4);
    if(hit){ webDrag={node:hit,ox:x-hit.x,oy:y-hit.y}; hit.pinned=true; canvas.style.cursor='grabbing'; }
  };
  canvas.onmousemove = e => {
    const {x,y} = canvasPos(e,canvas);
    if(webDrag){ webDrag.node.x=x-webDrag.ox; webDrag.node.y=y-webDrag.oy; }
    else { const hit=webNodes.find(n=>dist(n,{x,y})<n.r+4); canvas.style.cursor=hit?'pointer':'grab'; }
  };
  canvas.onmouseup = e => {
    if(webDrag){ webDrag=null; canvas.style.cursor='grab'; }
  };
  canvas.onclick = e => {
    const {x,y} = canvasPos(e,canvas);
    const hit = webNodes.find(n => dist(n,{x,y})<n.r+4);
    if(hit){ webSelected=hit.name===webSelected?null:hit.name; showConflictDetail(webSelected); drawWeb(); }
    else { webSelected=null; showConflictDetail(null); drawWeb(); }
  };

  // Double-click pin toggle
  canvas.ondblclick = e => {
    const {x,y} = canvasPos(e,canvas);
    const hit = webNodes.find(n=>dist(n,{x,y})<n.r+4);
    if(hit) hit.pinned=!hit.pinned;
  };

  runSimulation(W,H);
}

function canvasPos(e,canvas){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function runSimulation(W,H){
  let tick=0;
  // Build name→node Map once per sim for O(1) edge lookups
  const _webNodeMap = new Map(webNodes.map(n=>[n.name,n]));
  function step(){
    tick++;
    const cooling = Math.max(0.05, 1 - tick/400);

    // Forces
    webNodes.forEach(n=>{ n.fx=0; n.fy=0; });

    // Repulsion between all node pairs
    for(let i=0;i<webNodes.length;i++){
      for(let j=i+1;j<webNodes.length;j++){
        const a=webNodes[i],b=webNodes[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.max(1,Math.hypot(dx,dy));
        const strength=3200/(d*d);
        a.fx-=dx/d*strength; a.fy-=dy/d*strength;
        b.fx+=dx/d*strength; b.fy+=dy/d*strength;
      }
    }

    // Edge attraction (spring)
    // _webNodeMap built outside step loop for O(1) lookups
    webEdges.forEach(edge=>{
      const a=_webNodeMap.get(edge.a);
      const b=_webNodeMap.get(edge.b);
      if(!a||!b) return;
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.max(1,Math.hypot(dx,dy));
      const ideal=120;
      const f=(d-ideal)*0.035;
      a.fx+=dx/d*f; a.fy+=dy/d*f;
      b.fx-=dx/d*f; b.fy-=dy/d*f;
    });

    // Gravity towards centre
    webNodes.forEach(n=>{
      n.fx+=(W/2-n.x)*0.018;
      n.fy+=(H/2-n.y)*0.018;
    });

    // Integrate
    webNodes.forEach(n=>{
      if(n.pinned||webDrag?.node===n) return;
      n.vx=(n.vx+n.fx)*0.72*cooling;
      n.vy=(n.vy+n.fy)*0.72*cooling;
      n.x=Math.max(n.r+4, Math.min(W-n.r-4, n.x+n.vx));
      n.y=Math.max(n.r+4, Math.min(H-n.r-4, n.y+n.vy));
    });

    drawWeb();
    webAnim=requestAnimationFrame(step);
  }
  webAnim=requestAnimationFrame(step);
}

function drawWeb(){
  const canvas=document.getElementById('conflictCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0d0a06';
  ctx.fillRect(0,0,W,H);

  // Build fast lookups for draw
  const _drawNodeMap = new Map(webNodes.map(n=>[n.name,n]));
  const _connSet = webSelected
    ? new Set(webEdges.flatMap(e=>(e.a===webSelected||e.b===webSelected)?[e.a,e.b]:[]))
    : null;

  // Draw edges
  webEdges.forEach(edge=>{
    const a=_drawNodeMap.get(edge.a);
    const b=_drawNodeMap.get(edge.b);
    if(!a||!b) return;
    const isSelected = webSelected && (edge.a===webSelected||edge.b===webSelected);
    const isDimmed = webSelected && !isSelected;
    ctx.globalAlpha = isDimmed ? 0.08 : isSelected ? 1 : 0.55;

    const color = REL_COLORS[edge.type]||'#888';
    ctx.strokeStyle=color;
    ctx.lineWidth= isSelected ? 2.5 : 1.5;

    // Dashed for scheme/complex
    if(edge.type==='scheme') ctx.setLineDash([5,4]);
    else if(edge.type==='complex') ctx.setLineDash([2,3]);
    else ctx.setLineDash([]);

    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Edge label on hover/selected
    if(isSelected && edge.label){
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      const maxW=160;
      ctx.globalAlpha=0.92;
      ctx.font='10px serif';
      // Wrap text
      const words=edge.label.split(' ');
      const lines=[]; let line='';
      words.forEach(w=>{ const t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW){lines.push(line);line=w;}else{line=t;} });
      if(line)lines.push(line);
      const lh=13, pad=5;
      const bh=lines.length*lh+pad*2, bw=maxW+pad*2;
      ctx.fillStyle='rgba(10,8,4,0.88)';
      roundRect(ctx,mx-bw/2,my-bh/2,bw,bh,3);
      ctx.fill();
      ctx.fillStyle=color;
      lines.forEach((l,i)=>{ ctx.fillText(l,mx-maxW/2,my-bh/2+pad+lh*(i+0.85)); });
    }
    ctx.globalAlpha=1;
  });

  // Draw nodes
  webNodes.forEach(node=>{
    const isSelected = node.name===webSelected;
    const isDimmed = webSelected && !isSelected && !(_connSet&&_connSet.has(node.name));
    ctx.globalAlpha = isDimmed ? 0.2 : 1;

    const r=node.r;

    // Outer glow for selected
    if(isSelected){
      ctx.shadowColor='#d4aa45'; ctx.shadowBlur=18;
    }

    // Node circle background
    ctx.fillStyle=node.color;
    ctx.beginPath(); ctx.arc(node.x,node.y,r,0,Math.PI*2); ctx.fill();

    // Portrait clip
    if(node._img){
      ctx.save();
      ctx.beginPath(); ctx.arc(node.x,node.y,r-1,0,Math.PI*2); ctx.clip();
      ctx.drawImage(node._img,node.x-r+1,node.y-r+1,(r-1)*2,(r-1)*2);
      ctx.restore();
    }

    // Node border
    ctx.shadowBlur=0;
    ctx.strokeStyle = isSelected ? '#d4aa45' : '#c9b48a';
    ctx.lineWidth = isSelected ? 2.5 : 1;
    ctx.beginPath(); ctx.arc(node.x,node.y,r,0,Math.PI*2); ctx.stroke();

    // Name label
    ctx.fillStyle = isDimmed ? '#555' : '#e8d5b0';
    ctx.font = `${isSelected?'bold ':''} ${Math.max(9,r*0.62)}px 'Cinzel',serif`;
    ctx.textAlign='center';
    const label = node.name.length>14 ? node.name.slice(0,13)+'…' : node.name;
    ctx.fillText(label, node.x, node.y+r+12);

    ctx.globalAlpha=1;
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function renderEstatesPanel(charName) {
  const data = MANOR_DATA[charName];
  if (!data) return '<div style="padding:2rem;color:#3d2a0e;font-style:italic">No estate data for this family.</div>';

  const portrait = PORTRAITS[charName] || null;

  // ── Classify manors ──
  // idx=0 + Demesne → home; other Demesne → remote demesne; Enfeoffed → enfeoffed
  const classifyManor = (m, idx) => {
    if (idx === 0 && m.type.includes('Demesne')) return 'home';
    if (m.type.includes('Demesne')) return 'demesne';
    return 'enfeoffed';
  };

  const homeManor     = data.manors.find((m,i) => classifyManor(m,i) === 'home');
  const demesneManors = data.manors.filter((m,i) => classifyManor(m,i) === 'demesne');
  const enfeoffManors = data.manors.filter((m,i) => classifyManor(m,i) === 'enfeoffed');

  // ── sparkline helper ──
  function sparkline(history, key, color, w=80, h=24) {
    if (!history || !history.length) return `<span style="color:#3d2a0e;font-style:italic;font-size:.7rem">no data</span>`;
    const vals = history.map(h => h[key]||0);
    const mn = Math.min(...vals), mx = Math.max(...vals), range = mx-mn||1;
    const pts = vals.map((v,i)=>{ const x=(i/(vals.length-1||1))*(w-4)+2, y=h-2-((v-mn)/range)*(h-4); return `${x},${y}`; }).join(' ');
    return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1||1))*(w-4)+2,y=h-2-((v-mn)/range)*(h-4);return `<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;}).join('')}</svg>`;
  }

  function barChart(totals) {
    if (!totals.length) return '';
    const W=320, H=90, pad=28, barW=Math.min(26,(W-pad*2)/totals.length-4);
    const maxVal = Math.max(...totals.flatMap(t=>[t.income,t.expenses,Math.abs(t.final)]))||1;
    const scale = (H-20)/maxVal;
    const bars = totals.map((t,i)=>{
      const x=pad+i*((W-pad*2)/totals.length)+((W-pad*2)/totals.length-barW*2-2)/2;
      const incH=Math.max(1,t.income*scale), expH=Math.max(1,t.expenses*scale);
      const finColor=t.final>=0?'#b8902a':'#c0392b';
      return `<rect x="${x}" y="${H-10-incH}" width="${barW}" height="${incH}" fill="#2a7a2a" opacity="0.9"/>
        <rect x="${x+barW+2}" y="${H-10-expH}" width="${barW}" height="${expH}" fill="#8a1a1a" opacity="0.9"/>
        <text x="${x+barW}" y="${H-2}" text-anchor="middle" font-size="8" fill="#3a2008">${t.year}</text>
        <text x="${x+barW}" y="${H-10-Math.max(incH,expH)-3}" text-anchor="middle" font-size="7.5" fill="${finColor}">${t.final>=0?'+':''}${t.final}£</text>`;
    }).join('');
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">
      <text x="4" y="10" font-size="7" fill="#1a7a1a">■ Income</text>
      <text x="56" y="10" font-size="7" fill="#aa2020">■ Expenses</text>

  // ── HOLDINGS SECTION (demesne + enfeoffed) ──
  let holdingsHtml = '';

  if (allHoldings.length) {

      return `<div style="background:${bg};border:1px solid ${borderCol};border-left:3px solid ${borderCol};border-radius:3px;padding:.6rem .9rem;flex:1;min-width:170px;max-width:280px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:.4rem">
          <span style="font-family:'Cinzel',serif;font-size:.85rem;color:#e8c890">🏰 ${m.name}</span>
          <span style="font-size:.58rem;font-family:'Cinzel',serif;text-transform:uppercase;background:${typeBadgeBg};color:${typeBadgeCol};padding:.08rem .4rem;border-radius:2px;border:1px solid ${borderCol}">${typeLabel}</span>
        </div>

        ${incomeNote}

    }).join('');
    holdingsHtml = `<div style="margin-bottom:1.4rem">
      <div style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.6rem">Holdings</div>

  // ── Sidebar ──
  const sidebar = `
    <div style="position:sticky;top:1rem;display:flex;flex-direction:column;gap:.8rem">
      <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">
        <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:#3a2008;text-transform:uppercase;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--parchment-shadow)">Estate Summary</div>
        ${yearTotals.length ? `
        <div style="margin-bottom:.8rem">${barChart(yearTotals)}</div>
        <table style="width:100%;border-collapse:collapse;font-size:.8rem">
          <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:left;padding:.2rem .3rem">Year</th>

            <th style="font-family:'Cinzel',serif;font-size:.6rem;color:#3a2008;text-align:right;padding:.2rem .3rem">Net</th>

          <tbody>

              <td style="font-family:'Cinzel',serif;font-size:.74rem;color:#3a2008;padding:.25rem .3rem">${t.year}</td>
              <td style="color:#2a5a2a;text-align:right;padding:.25rem .3rem;font-weight:600">${t.income}£</td>
              <td style="color:#6a2a2a;text-align:right;padding:.25rem .3rem;font-weight:600">${t.expenses}£</td>
              <td style="font-weight:700;text-align:right;padding:.25rem .3rem;color:${t.final>=0?'#5a3a00':'#8a1a1a'}">${t.final>=0?'+':''}${t.final}£</td>
            </tr>`).join('')}
          </tbody>
        </table>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem">No records yet.</div>`}

      <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">

        ${data.manors.map((m,i)=>{
          const cls = classifyManor(m,i);
          const icon = cls==='home'?'🏠':cls==='demesne'?'🌾':'⚔';

            </div>

  const header = `<div style="background:linear-gradient(90deg,#1a1006,#120c04);padding:.9rem 1.4rem;display:flex;align-items:center;gap:1.2rem;margin-bottom:1.2rem;border-radius:3px;border:1px solid var(--gold)">

function renderEconomics() {
  const panel = document.getElementById('mainPanel');
  const chars = Object.keys(MANOR_DATA);

  const tabs = chars.map(c =>
    `<button onclick="activeEconTab='${c}';renderEconomics()" style="font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;padding:.45rem 1.1rem;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;background:${activeEconTab===c?'var(--gold)':'#1a1209'};color:${activeEconTab===c?'var(--ink)':'#e0c878'};border-right:1px solid var(--gold)">${c}</button>`
  ).join('');

  const data = MANOR_DATA[activeEconTab];
  const portrait = PORTRAITS[activeEconTab] || null;

  // Summary across all manors
  const allHistory = data.manors.flatMap(m => m.history);
  const years = [...new Set(allHistory.map(h => h.year))].sort();
  const yearTotals = years.map(y => {
    const rows = allHistory.filter(h => h.year === y);
    return {
      year: y,
      income: rows.reduce((s,r) => s + (r.income||0), 0),
      expenses: rows.reduce((s,r) => s + (r.lifestyleCost||0) + (r.improvMaint||0) + (r.family||0) + (r.improvBuild||0), 0),
      final: rows.reduce((s,r) => s + (r.final||0), 0),
    };
  });

  // Mini sparkline SVG for each manor history
  function sparkline(history, key, color, w=80, h=24) {
    if (!history.length) return `<span style="color:#3d2a0e;font-style:italic;font-size:.7rem">no data</span>`;
    const vals = history.map(h => h[key]||0);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    const range = mx - mn || 1;
    const pts = vals.map((v,i) => {
      const x = (i/(vals.length-1||1))*(w-4)+2;
      const y = h-2 - ((v-mn)/range)*(h-4);
      return `${x},${y}`;
    }).join(' ');
    return `<svg width="${w}" height="${h}" style="vertical-align:middle"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=(i/(vals.length-1||1))*(w-4)+2,y=h-2-((v-mn)/range)*(h-4);return `<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`;}).join('')}</svg>`;
  }

  // Bar chart SVG for year totals
  function barChart(totals) {
    if (!totals.length) return '';
    const W=340, H=90, pad=32, barW=Math.min(28, (W-pad*2)/totals.length - 4);
    const maxVal = Math.max(...totals.flatMap(t=>[t.income, t.expenses, Math.abs(t.final)])) || 1;
    const scale = (H-20)/maxVal;
    const bars = totals.map((t,i) => {
      const x = pad + i*((W-pad*2)/totals.length) + ((W-pad*2)/totals.length - barW*2 - 2)/2;
      const incH = Math.max(1,t.income*scale), expH = Math.max(1,t.expenses*scale);
      const finColor = t.final>=0?'#b8902a':'#c0392b';
      return `
        <rect x="${x}" y="${H-10-incH}" width="${barW}" height="${incH}" fill="#2a7a2a" opacity="0.9"/>
        <rect x="${x+barW+2}" y="${H-10-expH}" width="${barW}" height="${expH}" fill="#8a1a1a" opacity="0.9"/>
        <text x="${x+barW}" y="${H-2}" text-anchor="middle" font-size="8" fill="#aaa">${t.year}</text>
        <text x="${x+barW}" y="${H-10-Math.max(incH,expH)-3}" text-anchor="middle" font-size="7.5" fill="${finColor}">${t.final>=0?'+':''}${t.final}£</text>`;
    }).join('');
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">
      <text x="4" y="10" font-size="7" fill="#5a9a5a">■ Income</text>
      <text x="60" y="10" font-size="7" fill="#9a5a5a">■ Expenses</text>
      ${bars}
    </svg>`;
  }

  // Manor cards
  const manorCards = data.manors.map(manor => {
    const lastYear = manor.history[manor.history.length-1];
    const trend = manor.history.length >= 2
      ? manor.history[manor.history.length-1].final - manor.history[manor.history.length-2].final
      : null;
    const trendArrow = trend === null ? '' : trend > 0 ? `<span style="color:#4a9a4a">▲ ${trend>0?'+':''}${trend}£</span>` : trend < 0 ? `<span style="color:#e06060">▼ ${trend}£</span>` : `<span style="color:#888">─ stable</span>`;

    const histRows = manor.history.map(h => {
      const net = h.final;
      const netColor = net >= 0 ? '#80c080' : '#a03030';
      return `<tr>
        <td style="font-family:'Cinzel',serif;font-size:.72rem;color:#3a2008;white-space:nowrap">${h.year}</td>
        <td><span style="font-size:.7rem;color:${h.harvestResult==='Great'||h.harvestResult==='Good'?'#1a5010':h.harvestResult==='Bad'||h.harvestResult==='Poor'?'#8a1a1a':'#5a3a10'}">${h.harvestResult||'—'}</span></td>
        <td style="font-size:.78rem;color:#2a5a2a;text-align:right">${h.income||0}£</td>
        <td style="font-size:.78rem;color:#6a3a2a;text-align:right">${(h.lifestyleCost||0)+(h.improvMaint||0)+(h.family||0)+(h.improvBuild||0)}£</td>
        <td style="font-size:.82rem;font-weight:600;color:${netColor};text-align:right">${net>=0?'+':''}${net}£</td>
        <td style="font-size:.7rem;color:#3d2a0e;font-style:italic;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h.notes||''}">${h.notes||''}</td>
      </tr>`;
    }).join('');

    const IMPROV_ICONS2 = {'Dovecote':'🕊','Scriptorium':'📜','Apiary':'🍯','Observatory':'🔭','Brewery':'🍺','Carpenter Shop':'🪚','Coneygarth':'🐇','Dairy':'🥛','Ferry':'⛵','Fish Pond':'🐟','Gambling House':'🎲','Herb Garden':'🌿','Horse Herd (<530)':'🐴','Horse Herd (530+)':'🐴','Inn':'🏠','Jeweller':'💎','Logging Station':'🪵','Lumber Mill':'🪵','Olive Grove':'🫒','Orchard':'🍎','Salt Evaporator':'🧂','Sheep Herd':'🐑','Vineyard':'🍇','Winery':'🍷','Winery, Fine':'🍷'};
    const improvBadges = (manor.improvements||[]).length ? `
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem">
        ${(manor.improvements||[]).map(imp => {
          const inv = INVESTMENT_DATA[imp] || {};
          const icon = IMPROV_ICONS2[imp] || '⚙';
          const notesTip = inv.notes ? ` title="${inv.notes}"` : '';
          return `<div${notesTip} style="cursor:${inv.notes?'help':'default'};background:var(--parchment);border:1px solid var(--parchment-shadow);border-top:2px solid var(--gold);border-radius:3px;padding:.45rem .7rem;min-width:110px;box-shadow:2px 2px 0 rgba(0,0,0,.15)">
            <div style="font-size:1.1rem;margin-bottom:.2rem">${icon}</div>
            <div style="font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.08em;color:#1a1209;font-weight:600;margin-bottom:.25rem">${imp}</div>
            <div style="display:flex;gap:.5rem;align-items:center">
              <span style="font-family:'Cinzel',serif;font-size:.58rem;color:#1a6a10;font-weight:600" title="Annual income roll">↑ ${inv.income||'—'}£</span>
              <span style="color:#c0c0a0;font-size:.55rem">|</span>
              <span style="font-family:'Cinzel',serif;font-size:.58rem;color:#9a2020" title="Annual maintenance">↓ ${inv.maint||'—'}£</span>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';

    const bonusBadge = manor.bonus
      ? `<span style="font-size:.68rem;padding:.12rem .45rem;background:#1a1a2a;border:1px solid #3a3a5a;border-radius:2px;color:#8080c0">${manor.bonus}</span>`
      : '';

    return `<div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:3px;overflow:hidden;margin-bottom:1rem;box-shadow:2px 2px 0 rgba(0,0,0,.3)">
      <div style="background:var(--ink);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap">
        <div>
          <span style="font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-light)">🏰 ${manor.name}</span>
          <span style="font-size:.72rem;color:#7a5030;margin-left:.6rem;font-style:italic">${manor.type}</span>
          ${manor.knight?`<div style="font-size:.72rem;color:#2a5a18;margin-top:.1rem">⚔ Knight: ${manor.knight}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:.8rem">
          ${lastYear?`<div style="text-align:right"><div style="font-size:.65rem;color:var(--steel);font-family:'Cinzel',serif;letter-spacing:.08em">LAST YEAR</div><div style="font-family:'Cinzel',serif;font-size:1rem;color:${lastYear.final>=0?'#80c080':'#a03030'}">${lastYear.final>=0?'+':''}${lastYear.final}£</div></div>`:''}
          ${trendArrow?`<div style="font-size:.8rem">${trendArrow}</div>`:''}
        </div>
      </div>
      <div style="padding:.8rem 1rem">
        ${manor.notes?`<div style="font-size:.78rem;color:#3d2a0e;font-style:italic;margin-bottom:.6rem">${manor.notes}</div>`:''}
        <div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.6rem">${bonusBadge}${improvBadges}</div>
        ${manor.history.length ? `
        <div style="display:flex;gap:1.2rem;align-items:flex-start;flex-wrap:wrap">
          <div>
            <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--steel);text-transform:uppercase;margin-bottom:.3rem">Income trend</div>
            ${sparkline(manor.history,'income','#80c080')}
          </div>
          <div>
            <div style="font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;color:var(--steel);text-transform:uppercase;margin-bottom:.3rem">Net surplus</div>
            ${sparkline(manor.history,'final','#b8902a')}
          </div>
        </div>
        <div style="overflow-x:auto;margin-top:.8rem">
          <table style="width:100%;border-collapse:collapse;font-size:.78rem">
            <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Year</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Harvest</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Income</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Costs</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:right;padding:.25rem .4rem;font-weight:normal">Net</th>
              <th style="font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;color:var(--steel);text-align:left;padding:.25rem .4rem;font-weight:normal">Notes</th>
            </tr></thead>
            <tbody>${histRows}</tbody>
          </table>
        </div>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem;padding:.4rem 0">No yearly records yet.</div>`}
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
  <div style="background:var(--parchment);border:1px solid var(--parchment-shadow);border-radius:4px;box-shadow:4px 4px 0 rgba(0,0,0,.4);overflow:hidden">
    <div style="background:var(--ink);padding:1rem 1.4rem;display:flex;align-items:center;gap:1.2rem">
      ${portrait?`<img src="${portrait}" style="width:52px;height:52px;object-fit:cover;object-position:top;border-radius:50%;border:2px solid var(--gold)">`:''}
      <div>
        <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold-light);letter-spacing:.08em">⚖ Estate of ${activeEconTab}</div>
        
      </div>
    </div>

    <div style="display:flex;border-bottom:1px solid var(--parchment-shadow);background:rgba(0,0,0,.15);overflow-x:auto">
      ${tabs}
    </div>

    <div style="padding:1.2rem;display:grid;grid-template-columns:1fr 320px;gap:1.2rem;align-items:start">
      <div>${manorCards}</div>

      <div style="position:sticky;top:1rem">
        <div style="background:rgba(0,0,0,.08);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem;margin-bottom:1rem">
          <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.8rem">Estate Summary</div>
          ${yearTotals.length ? `
          <div style="margin-bottom:.8rem">${barChart(yearTotals)}</div>
          <table style="width:100%;border-collapse:collapse;font-size:.78rem">
            <thead><tr style="border-bottom:1px solid var(--parchment-shadow)">
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:left;padding:.2rem;font-weight:normal">Year</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">In</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">Out</th>
              <th style="font-family:'Cinzel',serif;font-size:.58rem;color:var(--steel);text-align:right;padding:.2rem;font-weight:normal">Net</th>
            </tr></thead>
            <tbody>
              ${yearTotals.map(t=>`<tr>
                <td style="font-family:'Cinzel',serif;font-size:.72rem;color:#3a2008;padding:.2rem">${t.year}</td>
                <td style="color:#4a9a4a;text-align:right;padding:.2rem">${t.income}£</td>
                <td style="color:#e06060;text-align:right;padding:.2rem">${t.expenses}£</td>
                <td style="font-weight:600;text-align:right;padding:.2rem;color:${t.final>=0?'#5a3a00':'#7a0808'}">${t.final>=0?'+':''}${t.final}£</td>
              </tr>`).join('')}
            </tbody>
          </table>` : `<div style="color:#3d2a0e;font-style:italic;font-size:.78rem">No records yet.</div>`}
        </div>

        <div style="background:rgba(0,0,0,.08);border:1px solid var(--parchment-shadow);border-radius:3px;padding:1rem">
          <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--steel);text-transform:uppercase;margin-bottom:.7rem">Holdings</div>
          ${data.manors.map(m=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid rgba(201,180,138,.15)">
              <div>
                <div style="font-size:.82rem;color:#3d2a0e">🏰 ${m.name}</div>
                <div style="font-size:.68rem;color:#3d2a0e;font-style:italic">${m.type}</div>
              </div>
              <span style="font-size:.65rem;padding:.1rem .4rem;border-radius:2px;background:${m.type.includes('Demesne')?'#1a2a1a':'#2a1a1a'};color:${m.type.includes('Demesne')?'#80a060':'#a06060'};border:1px solid ${m.type.includes('Demesne')?'#3a5a2a':'#5a2a2a'}">${m.type.includes('Enfeoff')?'Enfeoffed':'Demesne'}</span>
            </div>`).join('')}
          <div style="margin-top:.7rem;font-size:.72rem;color:#3d2a0e">
            <div>Manors: <strong style="color:#1a1209">${data.manors.length}</strong></div>
            <div>Improvements: <strong style="color:#1a5010">${data.manors.flatMap(m=>m.improvements||[]).length}</strong></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}


document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();};
document.getElementById('gmSection').style.display='flex';
document.getElementById('gmSection').style.flexDirection='column';
document.addEventListener('DOMContentLoaded', () => {
  render();
});
function setTheme(t){
  document.body.classList.remove('theme-verdant','theme-crimson');
  if(t) document.body.classList.add('theme-'+t);
  localStorage.setItem('pendragon-theme', t);
  ['parchment','verdant','crimson'].forEach(n => {
    const b = document.getElementById('thm-'+n);
    if(b) b.style.outline = (t===n||(t===''&&n==='parchment')) ? '2px solid white' : 'none';
  });
}
// Restore on load
(function(){ const t=localStorage.getItem('pendragon-theme')||''; setTheme(t); })();

</script>
</body>
</html>
